<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLEA POS - Complete System</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
        .app-container{max-width:480px;margin:0 auto;min-height:100vh;background:#16213e;position:relative}
        @media(min-width:768px){.app-container{max-width:768px}}
        #loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:15px}
        .login-card{background:#1e2a4a;border-radius:20px;padding:20px;width:100%;max-width:340px;border:1px solid #2a3a5e}
        .login-logo{text-align:center;margin-bottom:20px}
        .login-logo h1{color:#9b8fff;font-size:1.8em}
        .login-logo p{color:#a0a0b0;font-size:.85em}
        .user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
        .user-card{background:#16213e;border:2px solid #2a3a5e;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
        .user-card.selected{border-color:#7c6fff;background:#0f3460}
        .user-card .avatar{font-size:1.8em}
        .user-card .name{font-size:.7em;color:#e0e0e0;margin-top:3px}
        .role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65em;margin-top:3px}
        .admin-badge{background:#7c6fff;color:#fff}.manager-badge{background:#2ed573;color:#fff}.cashier-badge{background:#ffa502;color:#fff}
        .section-label{text-align:center;color:#e0e0e0;font-size:.9em;margin:10px 0}
        .pin-display{display:flex;justify-content:center;gap:12px;margin:15px 0}
        .pin-dot{width:14px;height:14px;border-radius:50%;background:#2a3a5e;transition:all .3s}
        .pin-dot.filled{background:#7c6fff;box-shadow:0 0 8px #7c6fff}
        .pin-dot.error{background:#ff4757}
        .error-msg{color:#ff4757;text-align:center;font-size:.8em;min-height:18px;margin:5px 0}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .pin-btn{background:#0f3460;border:1px solid #2a3a5e;border-radius:10px;padding:16px;font-size:1.3em;cursor:pointer;color:#e0e0e0}
        .pin-btn:active{background:#7c6fff}.pin-btn.clear{background:#ff4757;color:#fff;font-size:.9em}.pin-btn.submit{background:#2ed573;color:#fff;font-size:.9em}
        #mainApp{display:none}
        .header{background:#1a1a2e;padding:12px 15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3a5e}
        .header h1{color:#9b8fff;font-size:1.2em}
        .header-right{display:flex;align-items:center;gap:10px;font-size:.8em;color:#a0a0b0}
        .logout-btn{background:#ff4757;color:#fff;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:.8em}
        .hamburger{background:none;border:none;color:#e0e0e0;font-size:22px;cursor:pointer}
        .nav-bar{display:flex;overflow-x:auto;padding:8px;background:#1e2a4a;margin:8px;border-radius:10px;gap:5px;-webkit-overflow-scrolling:touch}
        .nav-btn{flex:0 0 auto;padding:8px 14px;background:#16213e;border:1px solid #2a3a5e;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:.8em;color:#a0a0b0;position:relative}
        .nav-btn.active{background:#7c6fff;color:#fff;border-color:#7c6fff}
        .nav-btn .badge{position:absolute;top:-5px;right:-5px;background:#ff4757;color:#fff;border-radius:50%;padding:1px 6px;font-size:.65em;min-width:18px;text-align:center}
        #mainContent{padding:10px;min-height:60vh}
        .card{background:#1e2a4a;border-radius:10px;padding:15px;margin:8px 0;border:1px solid #2a3a5e}
        .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .metric-card{background:#16213e;border-radius:8px;padding:12px;text-align:center;border:1px solid #2a3a5e}
        .metric-value{font-size:1.1em;font-weight:bold;color:#9b8fff}
        .metric-label{font-size:.65em;color:#a0a0b0;margin-top:4px}
        .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .product-card{background:#16213e;border-radius:8px;padding:12px;cursor:pointer;border:1px solid #2a3a5e;transition:all .2s}
        .product-card:active{transform:scale(.96)}.product-card .stock-low{color:#ff4757;font-weight:bold}
        .btn{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:500;transition:all .2s}
        .btn:active{transform:scale(.95)}.btn-primary{background:#7c6fff;color:#fff}.btn-success{background:#2ed573;color:#fff}.btn-danger{background:#ff4757;color:#fff}.btn-warning{background:#ffa502;color:#fff}
        .btn-sm{padding:5px 10px;font-size:.7em}.btn-xs{padding:3px 8px;font-size:.65em}
        input,select,textarea{width:100%;padding:10px;border:2px solid #2a3a5e;border-radius:20px;font-size:.9em;background:#0f3460;color:#e0e0e0;outline:none;font-family:inherit}
        input:focus,select:focus,textarea:focus{border-color:#7c6fff}input::placeholder{color:#6a6a7a}select option{background:#1e2a4a;color:#e0e0e0}
        table{width:100%;border-collapse:collapse;font-size:.8em}
        th{background:#0f3460;color:#9b8fff;padding:8px;text-align:left;position:sticky;top:0}
        td{padding:8px;border-bottom:1px solid #2a3a5e;color:#a0a0b0}tr:hover td{background:rgba(124,111,255,0.05)}
        .cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a3a5e;gap:10px}
        .cart-item-info{flex:1;min-width:0}.cart-item-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cart-item-price{color:#9b8fff;font-size:.85em}
        .cart-item-qty{display:flex;align-items:center;gap:5px}
        .qty-btn{background:#0f3460;border:1px solid #2a3a5e;color:#e0e0e0;width:25px;height:25px;border-radius:50%;cursor:pointer;font-size:.8em;display:flex;align-items:center;justify-content:center}
        .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:260px;background:#1e2a4a;z-index:1000;transition:left .3s;overflow-y:auto;border-right:1px solid #2a3a5e}
        .sidebar.active{left:0}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999}
        .sidebar-overlay.active{display:block}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:15px}
        .modal.active{display:flex}
        .modal-content{background:#1e2a4a;border-radius:15px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid #2a3a5e}
        .modal-content h3,.modal-content h4{color:#9b8fff;margin-bottom:10px}
        .form-group{margin-bottom:12px}.form-group label{display:block;margin-bottom:4px;color:#a0a0b0;font-size:.85em}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .receipt{background:#fff;color:#000;padding:20px;border-radius:10px;font-family:'Courier New',monospace;font-size:.85em;line-height:1.6}
        .receipt h2,.receipt h3{color:#000;text-align:center}.receipt hr{border-color:#ccc}.receipt .total{font-size:1.2em;font-weight:bold}
        .filter-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
        .filter-tab{padding:6px 12px;border-radius:15px;border:1px solid #2a3a5e;background:#16213e;color:#a0a0b0;cursor:pointer;font-size:.75em}
        .filter-tab.active{background:#7c6fff;color:#fff;border-color:#7c6fff}
        .filter-tab .count{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 6px;margin-left:3px;font-size:.85em}
        .po-status{padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:500}
        .po-draft{background:#3a3a5e;color:#a0a0b0}.po-finalized{background:#2ed573;color:#fff}.po-received{background:#7c6fff;color:#fff}
        .barcode-display{background:#fff;padding:20px;text-align:center;border-radius:10px;color:#000}
        .barcode-display .barcode-text{font-family:'Courier New',monospace;font-size:1.5em;letter-spacing:3px;margin:10px 0}
        .qr-placeholder{width:150px;height:150px;margin:10px auto;background:linear-gradient(45deg,#000 25%,#fff 25%,#fff 50%,#000 50%,#000 75%,#fff 75%,#fff);background-size:20px 20px;border:1px solid #000}
        .discount-row{display:flex;align-items:center;gap:8px;margin:5px 0}
        .discount-row select,.discount-row input{flex:1}
        .history-log{max-height:200px;overflow-y:auto;font-size:.75em}
        .history-item{padding:6px;border-bottom:1px solid #2a3a5e;color:#a0a0b0}
        .history-item .time{color:#7c6fff;font-size:.9em}
        .alert{background:rgba(255,71,87,.15);border:1px solid #ff4757;border-radius:8px;padding:10px;margin:8px 0}
        .alert-warning{background:rgba(255,165,2,.15);border-color:#ffa502}
        .alert-success{background:rgba(46,213,115,.15);border-color:#2ed573}
        @media print{body{background:#fff}.header,.nav-bar,.sidebar,.modal,#loginScreen,.btn,.logout-btn,.hamburger{display:none!important}#mainApp{display:block!important}#mainContent{background:#fff;color:#000}.card,.metric-card{background:#fff;border:1px solid #ddd;color:#000}}
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loginScreen">
            <div class="login-card">
                <div class="login-logo"><h1>🏪 MLEA POS</h1><p>Complete Point of Sale System</p></div>
                <div class="section-label">👤 Select User</div>
                <div class="user-selector" id="userSelector"></div>
                <div class="section-label">🔢 Enter PIN</div>
                <div class="pin-display" id="pinDisplay"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="error-msg" id="errorMessage"></div>
                <div class="pin-pad">
                    <button class="pin-btn" onclick="enterPin('1')">1</button><button class="pin-btn" onclick="enterPin('2')">2</button><button class="pin-btn" onclick="enterPin('3')">3</button>
                    <button class="pin-btn" onclick="enterPin('4')">4</button><button class="pin-btn" onclick="enterPin('5')">5</button><button class="pin-btn" onclick="enterPin('6')">6</button>
                    <button class="pin-btn" onclick="enterPin('7')">7</button><button class="pin-btn" onclick="enterPin('8')">8</button><button class="pin-btn" onclick="enterPin('9')">9</button>
                    <button class="pin-btn clear" onclick="clearPin()">Clear</button><button class="pin-btn" onclick="enterPin('0')">0</button><button class="pin-btn submit" onclick="submitPin()">→</button>
                </div>
            </div>
        </div>
        <div id="mainApp">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
            <div class="sidebar" id="sidebar">
                <div style="padding:15px;background:#1a1a2e;border-bottom:1px solid #2a3a5e;"><h3 style="color:#9b8fff;">MLEA POS</h3><p style="font-size:.75em;color:#a0a0b0;" id="sidebarUserInfo"></p><span class="role-badge" id="sidebarRole" style="margin-top:5px;"></span></div>
                <div style="padding:10px;display:flex;flex-direction:column;gap:3px;" id="sidebarNav">
                    <button class="nav-btn" onclick="switchView('dashboard')">📊 Dashboard</button>
                    <button class="nav-btn" onclick="switchView('pos')">💻 POS Terminal</button>
                    <button class="nav-btn" onclick="switchView('inventory')">📦 Inventory <span class="badge" id="sidebarLowStock" style="display:none;">0</span></button>
                    <button class="nav-btn" onclick="switchView('suppliers')">🤝 Suppliers</button>
                    <button class="nav-btn" onclick="switchView('purchaseOrders')">📋 Purchase Orders</button>
                    <button class="nav-btn" onclick="switchView('expenses')">💸 Expenses</button>
                    <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>
                    <button class="nav-btn" id="navUsers" onclick="switchView('users')">👥 Users</button>
                    <button class="nav-btn" onclick="switchView('reports')">💾 Reports</button>
                </div>
            </div>
            <div class="header"><button class="hamburger" onclick="openSidebar()">☰</button><h1>MLEA POS</h1><div class="header-right"><span id="headerCurrency"></span><span id="headerUser"></span><button class="logout-btn" onclick="logout()">🚪</button></div></div>
            <div class="nav-bar" id="navBar">
                <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('pos')">💻 POS</button>
                <button class="nav-btn" onclick="switchView('inventory')">📦 Stock <span class="badge" id="navLowStock" style="display:none;">0</span></button>
                <button class="nav-btn" onclick="switchView('settings')">⚙️</button>
            </div>
            <div id="mainContent"><p style="text-align:center;padding:40px;color:#a0a0b0;">Loading...</p></div>
        </div>
    </div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        const DB={stores:['products','sales','saleItems','suppliers','purchaseOrders','expenses','users','settings','inventoryLogs'],init(){this.stores.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},getAll(key){return JSON.parse(localStorage.getItem('mlea_'+key)||'[]')},set(key,data){localStorage.setItem('mlea_'+key,JSON.stringify(data))},add(key,item){const items=this.getAll(key);item.id=items.length>0?Math.max(...items.map(i=>i.id))+1:1;item.createdAt=new Date().toISOString();items.push(item);this.set(key,items);return item.id},update(key,item){const items=this.getAll(key);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item}this.set(key,items)},delete(key,id){this.set(key,this.getAll(key).filter(i=>i.id!==id))},getById(key,id){return this.getAll(key).find(i=>i.id===id)}};DB.init();

        const currencies={USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',decimals:2},PHP:{symbol:'₱',name:'Philippine Peso',flag:'🇵🇭',decimals:2},EUR:{symbol:'€',name:'Euro',flag:'🇪🇺',decimals:2},GBP:{symbol:'£',name:'British Pound',flag:'🇬🇧',decimals:2},JPY:{symbol:'¥',name:'Japanese Yen',flag:'🇯🇵',decimals:0},INR:{symbol:'₹',name:'Indian Rupee',flag:'🇮🇳',decimals:2},CNY:{symbol:'¥',name:'Chinese Yuan',flag:'🇨🇳',decimals:2},KRW:{symbol:'₩',name:'Korean Won',flag:'🇰🇷',decimals:0},AUD:{symbol:'A$',name:'Australian Dollar',flag:'🇦🇺',decimals:2},CAD:{symbol:'C$',name:'Canadian Dollar',flag:'🇨🇦',decimals:2},SGD:{symbol:'S$',name:'Singapore Dollar',flag:'🇸🇬',decimals:2},MYR:{symbol:'RM',name:'Malaysian Ringgit',flag:'🇲🇾',decimals:2},IDR:{symbol:'Rp',name:'Indonesian Rupiah',flag:'🇮🇩',decimals:0},THB:{symbol:'฿',name:'Thai Baht',flag:'🇹🇭',decimals:2},AED:{symbol:'د.إ',name:'UAE Dirham',flag:'🇦🇪',decimals:2},SAR:{symbol:'﷼',name:'Saudi Riyal',flag:'🇸🇦',decimals:2},VND:{symbol:'₫',name:'Vietnamese Dong',flag:'🇻🇳',decimals:0},BRL:{symbol:'R$',name:'Brazilian Real',flag:'🇧🇷',decimals:2},MXN:{symbol:'Mex$',name:'Mexican Peso',flag:'🇲🇽',decimals:2},NGN:{symbol:'₦',name:'Nigerian Naira',flag:'🇳🇬',decimals:2}};

        let currentUser=null,currentView='dashboard',currentCurrency='USD',taxRate=0.1,discountRate=0,discountType='percent';
        let cart=[],selectedUserId=null,pinEntry='',products=[],users=[],inventoryFilter='all',receiptFooter='Thank you for your business!';

        function formatCurrency(a){const c=currencies[currentCurrency];return c.decimals===0?c.symbol+' '+Math.round(a).toLocaleString():c.symbol+a.toFixed(2)}
        function getLowStockCount(){return DB.getAll('products').filter(p=>p.active&&p.stock<10).length}
        function updateBadges(){const c=getLowStockCount();['sidebarLowStock','navLowStock'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=c;el.style.display=c>0?'inline':'none'}})}

        function initApp(){
            users=DB.getAll('users');if(users.length===0){[{name:'Admin User',role:'admin',active:true,pin:'1234'},{name:'Manager',role:'manager',active:true,pin:'5678'},{name:'Cashier',role:'cashier',active:true,pin:'9012'}].forEach(u=>DB.add('users',u));users=DB.getAll('users')}
            products=DB.getAll('products');if(products.length===0){[{sku:'SKU001',name:'Laptop',price:899.99,stock:15,category:'Electronics',active:true,barcode:'8901234567890'},{sku:'SKU002',name:'Mouse',price:24.99,stock:5,category:'Electronics',active:true,barcode:'8901234567891'},{sku:'SKU003',name:'Keyboard',price:59.99,stock:0,category:'Electronics',active:false,barcode:'8901234567892'},{sku:'SKU004',name:'Monitor',price:299.99,stock:8,category:'Electronics',active:true,barcode:'8901234567893'},{sku:'SKU005',name:'USB Cable',price:9.99,stock:3,category:'Accessories',active:true,barcode:'8901234567894'},{sku:'SKU006',name:'Headphones',price:79.99,stock:12,category:'Audio',active:true,barcode:'8901234567895'}].forEach(p=>DB.add('products',p));products=DB.getAll('products')}
            if(DB.getAll('suppliers').length===0){DB.add('suppliers',{name:'TechSupply Co.',phone:'555-0100',email:'sales@techsupply.com',address:'123 Tech St'});DB.add('suppliers',{name:'GlobalParts Inc.',phone:'555-0200',email:'info@globalparts.com',address:'456 Industry Ave'})}
            if(DB.getAll('expenses').length===0){DB.add('expenses',{type:'Rent',amount:2000,date:'2024-01-01',category:'Fixed'});DB.add('expenses',{type:'Electricity',amount:350,date:'2024-01-15',category:'Utilities'})}
            const saved=DB.getAll('settings');const cs=saved.find(s=>s.key==='currency');if(cs)currentCurrency=cs.value;const ts=saved.find(s=>s.key==='taxRate');if(ts)taxRate=parseFloat(ts.value);const fs=saved.find(s=>s.key==='receiptFooter');if(fs)receiptFooter=fs.value;
            updateBadges();renderLoginScreen();
        }

        function renderLoginScreen(){document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';users=DB.getAll('users');document.getElementById('userSelector').innerHTML=users.filter(u=>u.active).map(u=>`<div class="user-card ${selectedUserId===u.id?'selected':''}" onclick="selectUser(${u.id})"><div class="avatar">${u.role==='admin'?'👑':u.role==='manager'?'👨‍💼':'👤'}</div><div class="name">${u.name}</div><span class="role-badge ${u.role}-badge">${u.role}</span></div>`).join('')}
        function selectUser(id){selectedUserId=id;pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';renderLoginScreen()}
        function enterPin(d){if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}if(pinEntry.length<4){pinEntry+=d;updatePinDisplay();document.getElementById('errorMessage').textContent=''}}
        function clearPin(){pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent=''}
        function updatePinDisplay(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error')})}
        function submitPin(){if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}const user=users.find(u=>u.id===selectedUserId);if(user&&user.pin===pinEntry){currentUser=user;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('headerUser').textContent=user.name;document.getElementById('headerCurrency').textContent=currencies[currentCurrency].flag+' '+currentCurrency;document.getElementById('sidebarUserInfo').textContent=user.name+' ('+user.role+')';const sr=document.getElementById('sidebarRole');sr.textContent=user.role;sr.className='role-badge '+user.role+'-badge';const navUsers=document.getElementById('navUsers');if(navUsers)navUsers.style.display=user.role==='admin'?'block':'none';pinEntry='';selectedUserId=null;updatePinDisplay();updateBadges();switchView('dashboard')}else{document.getElementById('errorMessage').textContent='Wrong PIN!';pinEntry='';updatePinDisplay();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')),400)}}
        function logout(){if(cart.length>0&&!confirm('Cart has items. Logout anyway?'))return;currentUser=null;cart=[];discountRate=0;discountType='percent';document.getElementById('mainApp').style.display='none';closeSidebar();renderLoginScreen()}

        function openSidebar(){document.getElementById('sidebar').classList.add('active');document.getElementById('sidebarOverlay').classList.add('active')}
        function closeSidebar(){document.getElementById('sidebar').classList.remove('active');document.getElementById('sidebarOverlay').classList.remove('active')}
        function switchView(view){currentView=view;closeSidebar();updateBadges();document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const content=document.getElementById('mainContent');switch(view){case 'dashboard':renderDashboard(content);break;case 'pos':renderPOS(content);break;case 'inventory':renderInventory(content);break;case 'suppliers':renderSuppliers(content);break;case 'purchaseOrders':renderPurchaseOrders(content);break;case 'expenses':renderExpenses(content);break;case 'settings':renderSettings(content);break;case 'users':renderUsers(content);break;case 'reports':renderReports(content);break;default:renderDashboard(content)}}

        function renderDashboard(el){products=DB.getAll('products');const sales=DB.getAll('sales')||[];const today=new Date().toISOString().split('T')[0];const todaySales=sales.filter(s=>s.date===today).reduce((s,i)=>s+i.total,0);const monthSales=sales.filter(s=>s.date.startsWith(today.substring(0,7))).reduce((s,i)=>s+i.total,0);const monthTax=sales.filter(s=>s.date.startsWith(today.substring(0,7))).reduce((s,i)=>s+i.tax,0);const lowStock=getLowStockCount();const totalProducts=products.filter(p=>p.active).length;el.innerHTML=`<div class="metrics"><div class="metric-card"><div class="metric-value">${formatCurrency(todaySales)}</div><div class="metric-label">Today's Sales</div></div><div class="metric-card"><div class="metric-value">${formatCurrency(monthSales)}</div><div class="metric-label">Monthly Revenue</div></div><div class="metric-card"><div class="metric-value">${formatCurrency(monthTax)}</div><div class="metric-label">Tax Collected</div></div></div><div class="card"><h4>Welcome, ${currentUser.name}! 👋</h4><p style="color:#a0a0b0;font-size:.8em;">Role: ${currentUser.role} | Products: ${totalProducts} | Currency: ${currencies[currentCurrency].flag} ${currentCurrency}</p></div>${lowStock>0?`<div class="alert alert-warning">⚠️ <strong>${lowStock}</strong> products are low on stock! <button class="btn btn-sm btn-warning" onclick="switchView('inventory')">View</button></div>`:''}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;"><button class="btn btn-primary" onclick="switchView('pos')">🛒 New Sale</button><button class="btn btn-success" onclick="switchView('inventory')">📦 Inventory</button><button class="btn btn-warning" onclick="switchView('purchaseOrders')">📋 Purchases</button><button class="btn btn-primary" onclick="switchView('reports')">📊 Reports</button></div>`}

        function renderPOS(el){products=DB.getAll('products');const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0);const discount=discountType==='percent'?subtotal*(discountRate/100):discountRate;const afterDiscount=Math.max(0,subtotal-discount);const tax=afterDiscount*taxRate;const total=afterDiscount+tax;const activeProducts=products.filter(p=>p.active);el.innerHTML=`<div style="margin-bottom:10px;"><input type="text" id="scanInput" placeholder="🔍 Scan barcode or search product..." onkeypress="if(event.key==='Enter'){addToCart(event.target.value);event.target.value='';}"><button class="btn btn-primary btn-sm" style="margin-top:5px;" onclick="document.getElementById('scanInput').focus()">📷 Scan Mode</button></div><div class="product-grid">${activeProducts.slice(0,8).map(p=>`<div class="product-card" onclick="addToCart('${p.sku}')"><strong>${p.name}</strong><div style="color:#9b8fff;">${formatCurrency(p.price)}</div><small class="${p.stock<10?'stock-low':''}" style="color:#a0a0b0;">Stock: ${p.stock}</small></div>`).join('')}</div>${activeProducts.length>8?`<p style="text-align:center;color:#a0a0b0;font-size:.8em;">+${activeProducts.length-8} more products. Search above.</p>`:''}<div class="card" style="margin-top:10px;"><h4>🛒 Cart (${cart.length} items)</h4>${cart.map((item,i)=>`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">${formatCurrency(item.price)} each</div></div><div class="cart-item-qty"><button class="qty-btn" onclick="updateCartQty(${i},-1)">−</button><span>${item.quantity}</span><button class="qty-btn" onclick="updateCartQty(${i},1)">+</button></div><div style="font-weight:bold;min-width:60px;text-align:right;">${formatCurrency(item.price*item.quantity)}</div><button class="btn btn-danger btn-xs" onclick="removeFromCart(${i})">✕</button></div>`).join('')}${cart.length===0?'<p style="color:#a0a0b0;text-align:center;">Cart is empty</p>':''}<hr style="border-color:#2a3a5e;margin:10px 0;"><div>Subtotal: ${formatCurrency(subtotal)}</div><div class="discount-row"><span>Discount:</span><select id="discountType" onchange="changeDiscountType(this.value)" style="width:auto;flex:0 0 80px;"><option value="percent" ${discountType==='percent'?'selected':''}>%</option><option value="amount" ${discountType==='amount'?'selected':''}>${currencies[currentCurrency].symbol}</option></select><input type="number" id="discountValue" value="${discountType==='percent'?discountRate:discountRate}" step="${discountType==='percent'?1:0.01}" min="0" ${discountType==='percent'?'max="100"':''} onchange="updateDiscount(this.value)" style="flex:1;"></div><div style="color:#ffa502;">Discount: −${formatCurrency(discount)}</div><div>Tax (${(taxRate*100).toFixed(0)}%): ${formatCurrency(tax)}</div><div style="font-size:1.2em;color:#9b8fff;"><strong>Total: ${formatCurrency(total)}</strong></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;"><button class="btn btn-success" onclick="processPayment('cash')">💵 Cash</button><button class="btn btn-primary" onclick="processPayment('card')">💳 Card</button><button class="btn btn-warning" onclick="processPayment('other')">📱 Other</button></div><button class="btn btn-danger btn-sm" style="width:100%;margin-top:5px;" onclick="clearCart()">🗑️ Clear Cart</button></div>`;if(document.getElementById('scanInput'))document.getElementById('scanInput').focus()}

        function renderInventory(el){products=DB.getAll('products');let filtered=products;if(inventoryFilter==='low')filtered=products.filter(p=>p.active&&p.stock<10);if(inventoryFilter==='inactive')filtered=products.filter(p=>!p.active);if(inventoryFilter==='all')filtered=products.filter(p=>p.active);const lowCount=products.filter(p=>p.active&&p.stock<10).length;const inactiveCount=products.filter(p=>!p.active).length;el.innerHTML=`<div class="filter-tabs"><div class="filter-tab ${inventoryFilter==='all'?'active':''}" onclick="inventoryFilter='all';renderInventory(document.getElementById('mainContent'))">All<span class="count">${products.filter(p=>p.active).length}</span></div><div class="filter-tab ${inventoryFilter==='low'?'active':''}" onclick="inventoryFilter='low';renderInventory(document.getElementById('mainContent'))">Low Stock<span class="count">${lowCount}</span></div><div class="filter-tab ${inventoryFilter==='inactive'?'active':''}" onclick="inventoryFilter='inactive';renderInventory(document.getElementById('mainContent'))">Inactive<span class="count">${inactiveCount}</span></div></div><button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddProduct()">+ Add Product</button><div style="overflow-x:auto;"><table><thead><tr><th>SKU</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th></tr></thead><tbody>${filtered.map(p=>`<tr><td>${p.sku}</td><td>${p.name}</td><td>${formatCurrency(p.price)}</td><td>${p.stock} ${p.stock<10?'<span class="badge" style="background:#ff4757;">!</span>':''}</td><td>${p.category||'-'}</td><td style="white-space:nowrap;"><button class="btn btn-primary btn-xs" onclick="showBarcode('${p.barcode||p.sku}')">QR</button><button class="btn btn-success btn-xs" onclick="adjustStock(${p.id})">+</button><button class="btn btn-warning btn-xs" onclick="editProduct(${p.id})">✎</button><button class="btn btn-danger btn-xs" onclick="deleteProduct(${p.id})">✕</button></td></tr>`).join('')}</tbody></table></div>${filtered.length===0?'<p style="text-align:center;color:#a0a0b0;padding:20px;">No products found</p>':''}`}

        function renderSuppliers(el){const suppliers=DB.getAll('suppliers');el.innerHTML=`<button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddSupplier()">+ Add Supplier</button>${suppliers.map(s=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><h4>${s.name}</h4><button class="btn btn-primary btn-sm" onclick="createPO(${s.id})">Create PO</button></div><p style="color:#a0a0b0;font-size:.8em;">📞 ${s.phone} | 📧 ${s.email}</p><p style="color:#a0a0b0;font-size:.75em;">📍 ${s.address||'No address'}</p></div>`).join('')}`}

        function renderPurchaseOrders(el){const pos=DB.getAll('purchaseOrders');const suppliers=DB.getAll('suppliers');el.innerHTML=`<h4>📋 Purchase Orders</h4>${pos.map(po=>{const supplier=suppliers.find(s=>s.id===po.supplierId);return`<div class="card"><div style="display:flex;justify-content:space-between;"><strong>PO #${po.id}</strong><span class="po-status po-${po.status}">${po.status.toUpperCase()}</span></div><p style="color:#a0a0b0;font-size:.8em;">Supplier: ${supplier?supplier.name:'Unknown'} | Date: ${po.date}</p><p>Total: ${formatCurrency(po.total||0)} | Items: ${(po.items||[]).length}</p>${po.status==='draft'?`<button class="btn btn-success btn-sm" onclick="finalizePO(${po.id})">✅ Finalize</button><button class="btn btn-danger btn-sm" onclick="deletePO(${po.id})">🗑️</button>`:''}${po.status==='finalized'?`<button class="btn btn-primary btn-sm" onclick="receivePO(${po.id})">📥 Receive Stock</button>`:''}${po.status==='received'?`<p style="color:#2ed573;font-size:.8em;">✅ Received</p>`:''}</div>`}).join('')}${pos.length===0?'<p style="text-align:center;color:#a0a0b0;padding:20px;">No purchase orders yet</p>':''}`}

        function renderExpenses(el){const expenses=DB.getAll('expenses');const categories=[...new Set(expenses.map(e=>e.category))];el.innerHTML=`<button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddExpense()">+ Add Expense</button>${categories.map(cat=>{const catExpenses=expenses.filter(e=>e.category===cat);const catTotal=catExpenses.reduce((s,e)=>s+e.amount,0);return`<div class="card"><h4>${cat} <span style="color:#9b8fff;">${formatCurrency(catTotal)}</span></h4>${catExpenses.map(e=>`<div style="display:flex;justify-content:space-between;font-size:.8em;color:#a0a0b0;padding:3px 0;"><span>${e.type}</span><span>${formatCurrency(e.amount)} | ${e.date}</span></div>`).join('')}</div>`}).join('')}${expenses.length===0?'<p style="text-align:center;color:#a0a0b0;padding:20px;">No expenses yet</p>':''}`}

        function renderSettings(el){el.innerHTML=`<div class="card"><h4>💱 Currency Settings</h4><select id="currencySelect" onchange="changeCurrency(this.value)">${Object.entries(currencies).map(([code,c])=>`<option value="${code}" ${currentCurrency===code?'selected':''}>${c.flag} ${c.name} (${c.symbol})</option>`).join('')}</select><p style="color:#a0a0b0;font-size:.8em;margin-top:5px;">Current: ${currencies[currentCurrency].flag} ${currencies[currentCurrency].name}</p></div><div class="card"><h4>💰 Tax Rate</h4><input type="number" id="taxInput" value="${taxRate*100}" step="0.1" min="0" max="100"><p style="color:#a0a0b0;font-size:.8em;">Current: ${(taxRate*100).toFixed(1)}%</p><button class="btn btn-primary btn-sm" onclick="saveTax()">Save Tax</button></div><div class="card"><h4>📄 Receipt Footer</h4><input type="text" id="footerInput" value="${receiptFooter}"><button class="btn btn-primary btn-sm" style="margin-top:5px;" onclick="saveFooter()">Save Footer</button></div>`}

        function renderUsers(el){if(currentUser.role!=='admin'){el.innerHTML='<p style="text-align:center;color:#ff4757;padding:20px;">🔒 Admin access required</p>';return}users=DB.getAll('users');el.innerHTML=`<button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddUser()">+ Add User</button>${users.map(u=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div><strong>${u.name}</strong><span class="role-badge ${u.role}-badge">${u.role}</span><span>${u.active?'✅':'❌'}</span><div style="font-size:.7em;color:#a0a0b0;">PIN: ${u.pin}</div></div><div style="display:flex;gap:5px;"><button class="btn btn-primary btn-xs" onclick="editUser(${u.id})">✎</button><button class="btn btn-warning btn-xs" onclick="toggleUser(${u.id})">${u.active?'Deactivate':'Activate'}</button></div></div>`).join('')}`}

        function renderReports(el){el.innerHTML=`<div class="card"><h4>📊 Export Reports</h4><div style="display:grid;gap:8px;"><button class="btn btn-primary" onclick="exportCSV('sales')">💰 Sales Report (CSV)</button><button class="btn btn-success" onclick="exportCSV('inventory')">📦 Inventory Report (CSV)</button><button class="btn btn-primary" onclick="exportCSV('expenses')">💸 Expenses Report (CSV)</button></div></div><div class="card"><h4>💾 Backup & Restore</h4><p style="color:#a0a0b0;font-size:.75em;margin-bottom:8px;">${getLastBackupInfo()}</p><button class="btn btn-primary" style="width:100%;margin-bottom:5px;" onclick="backupData()">📥 Download Backup</button><button class="btn btn-warning" style="width:100%;" onclick="restoreBackup()">📤 Restore from Backup</button></div><div class="card"><h4>🖨️ Print Options</h4><button class="btn btn-warning" style="width:100%;" onclick="window.print()">🖨️ Print Current View</button></div><div class="card"><h4>🗑️ Danger Zone</h4><button class="btn btn-danger" style="width:100%;" onclick="clearAllData()">🗑️ Reset All Data</button></div>`}

        function addToCart(sku){const product=products.find(p=>(p.sku===sku||p.barcode===sku)&&p.active);if(product&&product.stock>0){const existing=cart.find(i=>i.sku===product.sku);if(existing){existing.quantity++}else{cart.push({...product,quantity:1})}switchView('pos')}else{alert('Product not found or out of stock!')}}
        function removeFromCart(i){cart.splice(i,1);switchView('pos')}
        function updateCartQty(i,change){const product=products.find(p=>p.id===cart[i].id);if(change>0&&cart[i].quantity>=product.stock){alert('Max stock reached!');return}cart[i].quantity+=change;if(cart[i].quantity<=0)cart.splice(i,1);switchView('pos')}
        function clearCart(){if(cart.length>0&&confirm('Clear entire cart?')){cart=[];discountRate=0;switchView('pos')}}
        function changeDiscountType(type){discountType=type;discountRate=0;switchView('pos')}
        function updateDiscount(val){discountRate=parseFloat(val)||0;switchView('pos')}
        function processPayment(method){if(cart.length===0){alert('Cart is empty!');return}const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0);const discount=discountType==='percent'?subtotal*(discountRate/100):discountRate;const afterDiscount=Math.max(0,subtotal-discount);const tax=afterDiscount*taxRate;const total=afterDiscount+tax;const sale={date:new Date().toISOString().split('T')[0],total,subtotal,discount,tax,paymentMethod:method,cashierId:currentUser.id,currency:currentCurrency,items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price}))};const saleId=DB.add('sales',sale);cart.forEach(item=>{DB.add('saleItems',{saleId,productId:item.id,quantity:item.quantity,price:item.price});const product=products.find(p=>p.id===item.id);if(product){product.stock-=item.quantity;DB.update('products',product)}});const receiptHTML=`<div class="receipt"><h2>MLEA POS</h2><p style="text-align:center;">Receipt #${saleId}</p><p style="text-align:center;">${new Date().toLocaleString()}</p><p style="text-align:center;">Cashier: ${currentUser.name}</p><hr>${cart.map(i=>`<div>${i.name} x${i.quantity} - ${formatCurrency(i.price*i.quantity)}</div>`).join('')}<hr><div>Subtotal: ${formatCurrency(subtotal)}</div>${discount>0?`<div>Discount: −${formatCurrency(discount)}</div>`:''}<div>Tax: ${formatCurrency(tax)}</div><div class="total">TOTAL: ${formatCurrency(total)}</div><div>Payment: ${method.toUpperCase()}</div><hr><p style="text-align:center;">${receiptFooter}</p></div>`;document.getElementById('modalContent').innerHTML=receiptHTML;document.getElementById('modal').classList.add('active');cart=[];discountRate=0;products=DB.getAll('products');updateBadges();setTimeout(()=>{document.getElementById('modal').classList.remove('active');switchView('dashboard')},3000)}

        function showAddProduct(){document.getElementById('modalContent').innerHTML=`<h4>Add Product</h4><div class="form-group"><label>Name *</label><input type="text" id="pName"></div><div class="form-group"><label>SKU</label><input type="text" id="pSku" placeholder="Auto-generated if empty"></div><div class="form-row"><div class="form-group"><label>Price *</label><input type="number" id="pPrice" step="0.01"></div><div class="form-group"><label>Stock *</label><input type="number" id="pStock" value="0"></div></div><div class="form-group"><label>Category</label><input type="text" id="pCategory" placeholder="e.g., Electronics"></div><div class="form-group"><label>Barcode</label><input type="text" id="pBarcode" placeholder="Scan or enter barcode"></div><button class="btn btn-primary" onclick="addProduct()">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function addProduct(){const name=document.getElementById('pName').value;const price=parseFloat(document.getElementById('pPrice').value);if(!name||!price){alert('Name and price required!');return}const product={sku:document.getElementById('pSku').value||('SKU'+Date.now().toString(36).toUpperCase()),name,price,stock:parseInt(document.getElementById('pStock').value)||0,category:document.getElementById('pCategory').value||'General',barcode:document.getElementById('pBarcode').value||'',active:true};DB.add('products',product);products=DB.getAll('products');closeModal();switchView('inventory')}
        function editProduct(id){const p=products.find(pr=>pr.id===id);if(!p)return;document.getElementById('modalContent').innerHTML=`<h4>Edit Product</h4><div class="form-group"><label>Name</label><input type="text" id="pName" value="${p.name}"></div><div class="form-group"><label>SKU</label><input type="text" id="pSku" value="${p.sku}"></div><div class="form-row"><div class="form-group"><label>Price</label><input type="number" id="pPrice" value="${p.price}" step="0.01"></div><div class="form-group"><label>Stock</label><input type="number" id="pStock" value="${p.stock}"></div></div><div class="form-group"><label>Category</label><input type="text" id="pCategory" value="${p.category||''}"></div><div class="form-group"><label>Barcode</label><input type="text" id="pBarcode" value="${p.barcode||''}"></div><div class="form-group"><label>Active</label><select id="pActive"><option value="1" ${p.active?'selected':''}>Yes</option><option value="0" ${!p.active?'selected':''}>No</option></select></div><button class="btn btn-primary" onclick="saveProduct(${id})">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function saveProduct(id){const p=products.find(pr=>pr.id===id);if(!p)return;p.name=document.getElementById('pName').value;p.sku=document.getElementById('pSku').value;p.price=parseFloat(document.getElementById('pPrice').value);p.stock=parseInt(document.getElementById('pStock').value);p.category=document.getElementById('pCategory').value;p.barcode=document.getElementById('pBarcode').value;p.active=document.getElementById('pActive').value==='1';DB.update('products',p);products=DB.getAll('products');closeModal();switchView('inventory')}
        function deleteProduct(id){if(confirm('Delete this product?')){DB.delete('products',id);products=DB.getAll('products');updateBadges();switchView('inventory')}}
        function adjustStock(id){const p=products.find(pr=>pr.id===id);document.getElementById('modalContent').innerHTML=`<h4>Adjust Stock: ${p.name}</h4><p style="color:#a0a0b0;">Current: ${p.stock}</p><div class="form-group"><label>New Stock</label><input type="number" id="newStock" value="${p.stock}"></div><div class="form-group"><label>Reason</label><select id="adjReason"><option>Restock</option><option>Damage</option><option>Correction</option><option>Return</option><option>Other</option></select></div><div class="form-group"><label>Note</label><input type="text" id="adjNote" placeholder="Optional note"></div><button class="btn btn-primary" onclick="saveStockAdjust(${id})">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button><div class="card" style="margin-top:10px;"><h5>Stock History</h5><div class="history-log">${(DB.getAll('inventoryLogs')||[]).filter(l=>l.productId===id).slice(-20).reverse().map(l=>`<div class="history-item"><span class="time">${new Date(l.createdAt).toLocaleString()}</span> ${l.oldStock}→${l.newStock} (${l.reason}) ${l.note||''}<br><small>by ${l.userName}</small></div>`).join('')||'<p style="color:#a0a0b0;">No history</p>'}</div></div>`;document.getElementById('modal').classList.add('active')}
        function saveStockAdjust(id){const p=products.find(pr=>pr.id===id);const oldStock=p.stock;const newStock=parseInt(document.getElementById('newStock').value);const reason=document.getElementById('adjReason').value;const note=document.getElementById('adjNote').value;if(isNaN(newStock)){alert('Enter valid stock number');return}p.stock=newStock;DB.update('products',p);DB.add('inventoryLogs',{productId:id,productName:p.name,oldStock,newStock,reason,note,userName:currentUser.name});products=DB.getAll('products');updateBadges();closeModal();switchView('inventory')}
        function showBarcode(code){document.getElementById('modalContent').innerHTML=`<div class="barcode-display"><h4>Barcode / QR Code</h4><div class="qr-placeholder"></div><div class="barcode-text">${code}</div><p style="font-size:.8em;color:#666;">Code: ${code}</p><button class="btn btn-primary" onclick="closeModal()">Close</button></div>`;document.getElementById('modal').classList.add('active')}
        function showAddSupplier(){document.getElementById('modalContent').innerHTML=`<h4>Add Supplier</h4><div class="form-group"><label>Name *</label><input type="text" id="sName"></div><div class="form-group"><label>Phone</label><input type="tel" id="sPhone"></div><div class="form-group"><label>Email</label><input type="email" id="sEmail"></div><div class="form-group"><label>Address</label><textarea id="sAddress" rows="2"></textarea></div><button class="btn btn-primary" onclick="addSupplier()">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function addSupplier(){const name=document.getElementById('sName').value;if(!name){alert('Name required!');return}DB.add('suppliers',{name,phone:document.getElementById('sPhone').value,email:document.getElementById('sEmail').value,address:document.getElementById('sAddress').value});closeModal();switchView('suppliers')}
        function createPO(supplierId){const products=DB.getAll('products').filter(p=>p.active);document.getElementById('modalContent').innerHTML=`<h4>Create Purchase Order</h4><div class="form-group"><label>Supplier</label><select id="poSupplier">${DB.getAll('suppliers').map(s=>`<option value="${s.id}" ${s.id===supplierId?'selected':''}>${s.name}</option>`).join('')}</select></div><div id="poItems"><h5>Items</h5></div><button class="btn btn-success btn-sm" onclick="addPOItem()">+ Add Item</button><div style="margin-top:10px;"><button class="btn btn-primary" onclick="savePO()">💾 Save as Draft</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button></div>`;document.getElementById('modal').classList.add('active');addPOItem()}
        function addPOItem(){const div=document.createElement('div');div.className='form-row';div.style.marginBottom='5px';div.innerHTML=`<select class="po-product"><option value="">Select product</option>${DB.getAll('products').map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><input type="number" class="po-qty" value="1" min="1" style="width:60px;"><button class="btn btn-danger btn-xs" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('poItems').appendChild(div)}
        function savePO(){const supplierId=parseInt(document.getElementById('poSupplier').value);const items=[];document.querySelectorAll('#poItems .form-row').forEach(row=>{const sel=row.querySelector('.po-product');const qty=row.querySelector('.po-qty');if(sel.value&&qty.value)items.push({productId:parseInt(sel.value),quantity:parseInt(qty.value),name:sel.options[sel.selectedIndex].text})});if(items.length===0){alert('Add at least one item!');return}const total=items.reduce((s,i)=>{const p=DB.getById('products',i.productId);return s+(p?p.price*i.quantity:0)},0);DB.add('purchaseOrders',{supplierId,date:new Date().toISOString().split('T')[0],status:'draft',items,total});closeModal();switchView('purchaseOrders')}
        function finalizePO(id){const po=DB.getById('purchaseOrders',id);if(po){po.status='finalized';DB.update('purchaseOrders',po);switchView('purchaseOrders')}}
        function receivePO(id){const po=DB.getById('purchaseOrders',id);if(po&&po.status==='finalized'){po.status='received';DB.update('purchaseOrders',po);po.items.forEach(item=>{const product=products.find(p=>p.id===item.productId);if(product){product.stock+=item.quantity;DB.update('products',product)}});products=DB.getAll('products');updateBadges();alert('✅ Stock updated automatically!');switchView('purchaseOrders')}}
        function deletePO(id){if(confirm('Delete this purchase order?')){DB.delete('purchaseOrders',id);switchView('purchaseOrders')}}
        function showAddExpense(){document.getElementById('modalContent').innerHTML=`<h4>Add Expense</h4><div class="form-group"><label>Type *</label><input type="text" id="eType" placeholder="e.g., Rent, Utilities"></div><div class="form-group"><label>Amount *</label><input type="number" id="eAmount" step="0.01"></div><div class="form-group"><label>Category</label><select id="eCategory"><option>Fixed</option><option>Variable</option><option>Utilities</option><option>Maintenance</option><option>Other</option></select></div><div class="form-group"><label>Date</label><input type="date" id="eDate" value="${new Date().toISOString().split('T')[0]}"></div><button class="btn btn-primary" onclick="addExpense()">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function addExpense(){const type=document.getElementById('eType').value;const amount=parseFloat(document.getElementById('eAmount').value);if(!type||!amount){alert('Type and amount required!');return}DB.add('expenses',{type,amount,date:document.getElementById('eDate').value,category:document.getElementById('eCategory').value});closeModal();switchView('expenses')}
        function showAddUser(){document.getElementById('modalContent').innerHTML=`<h4>Add User</h4><div class="form-group"><label>Name *</label><input type="text" id="uName"></div><div class="form-group"><label>Role</label><select id="uRole"><option value="cashier">Cashier</option><option value="manager">Manager</option><option value="admin">Admin</option></select></div><div class="form-group"><label>4-digit PIN *</label><input type="password" id="uPin" maxlength="4" pattern="[0-9]{4}"></div><button class="btn btn-primary" onclick="addUser()">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function addUser(){const name=document.getElementById('uName').value;const pin=document.getElementById('uPin').value;if(!name||pin.length!==4){alert('Name required and PIN must be 4 digits!');return}DB.add('users',{name,role:document.getElementById('uRole').value,active:true,pin});users=DB.getAll('users');closeModal();switchView('users');renderLoginScreen()}
        function editUser(id){const u=users.find(ur=>ur.id===id);if(!u)return;document.getElementById('modalContent').innerHTML=`<h4>Edit User</h4><div class="form-group"><label>Name</label><input type="text" id="uName" value="${u.name}"></div><div class="form-group"><label>Role</label><select id="uRole">${['admin','manager','cashier'].map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="form-group"><label>New PIN (leave blank to keep)</label><input type="password" id="uPin" maxlength="4" placeholder="Enter new PIN"></div><button class="btn btn-primary" onclick="saveUser(${id})">💾 Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active')}
        function saveUser(id){const u=users.find(ur=>ur.id===id);if(!u)return;u.name=document.getElementById('uName').value;u.role=document.getElementById('uRole').value;const pin=document.getElementById('uPin').value;if(pin.length===4)u.pin=pin;DB.update('users',u);users=DB.getAll('users');closeModal();switchView('users');renderLoginScreen()}
        function toggleUser(id){const u=users.find(ur=>ur.id===id);u.active=!u.active;DB.update('users',u);users=DB.getAll('users');switchView('users');renderLoginScreen()}

        function changeCurrency(code){currentCurrency=code;const all=DB.getAll('settings');const existing=all.find(s=>s.key==='currency');if(existing){existing.value=code;DB.update('settings',existing)}else{DB.add('settings',{key:'currency',value:code})}document.getElementById('headerCurrency').textContent=currencies[code].flag+' '+code;switchView('settings')}
        function saveTax(){const val=parseFloat(document.getElementById('taxInput').value);if(!isNaN(val)&&val>=0&&val<=100){taxRate=val/100;const all=DB.getAll('settings');const existing=all.find(s=>s.key==='taxRate');if(existing){existing.value=taxRate.toString();DB.update('settings',existing)}else{DB.add('settings',{key:'taxRate',value:taxRate.toString()})}alert('Tax rate saved!')}}
        function saveFooter(){receiptFooter=document.getElementById('footerInput').value;const all=DB.getAll('settings');const existing=all.find(s=>s.key==='receiptFooter');if(existing){existing.value=receiptFooter;DB.update('settings',existing)}else{DB.add('settings',{key:'receiptFooter',value:receiptFooter})}alert('Receipt footer saved!')}

        function exportCSV(type){let csv='';const curr=currentCurrency;if(type==='sales'){const sales=DB.getAll('sales');csv=`Date,Total (${curr}),Tax,Payment,Cashier\n`;sales.forEach(s=>{const u=users.find(ur=>ur.id===s.cashierId);csv+=`${s.date},${s.total},${s.tax},${s.paymentMethod},${u?u.name:'Unknown'}\n`})}else if(type==='inventory'){csv=`SKU,Name,Price (${curr}),Stock,Category,Barcode,Active\n`;products.forEach(p=>csv+=`${p.sku},${p.name},${p.price},${p.stock},${p.category||''},${p.barcode||''},${p.active}\n`)}else if(type==='expenses'){const expenses=DB.getAll('expenses');csv=`Type,Amount (${curr}),Date,Category\n`;expenses.forEach(e=>csv+=`${e.type},${e.amount},${e.date},${e.category}\n`)}const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${type}_report_${new Date().toISOString().split('T')[0]}.csv`;a.click()}

        function backupData(){const data={};DB.stores.forEach(s=>data[s]=DB.getAll(s));data.backupDate=new Date().toISOString();data.version='2.0';const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);const filename=`mlea_backup_${new Date().toISOString().split('T')[0]}_${new Date().toLocaleTimeString().replace(/:/g,'-')}.json`;a.download=filename;a.click();localStorage.setItem('mlea_last_backup',JSON.stringify({date:new Date().toISOString(),filename}));alert('✅ Backup downloaded!\nFile: '+filename+'\nKeep this file safe!')}

        function restoreBackup(){document.getElementById('modalContent').innerHTML=`<h4>📥 Restore from Backup</h4><div class="alert alert-warning">⚠️ This will REPLACE all current data!</div><div class="form-group"><label>Select backup file (.json)</label><input type="file" id="backupFile" accept=".json"></div><div id="backupPreview" style="margin:10px 0;"></div><button class="btn btn-primary" onclick="performRestore()">🔄 Restore Data</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button>`;document.getElementById('modal').classList.add('active');document.getElementById('backupFile').addEventListener('change',function(e){const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=function(event){try{const data=JSON.parse(event.target.result);const preview=document.getElementById('backupPreview');preview.innerHTML=`<div class="card" style="background:rgba(46,213,115,0.15);border-color:#2ed573;"><strong>Backup Info:</strong><br>Date: ${data.backupDate||'Unknown'}<br>Version: ${data.version||'Unknown'}<br>Products: ${(data.products||[]).length}<br>Sales: ${(data.sales||[]).length}<br>Suppliers: ${(data.suppliers||[]).length}<br>Users: ${(data.users||[]).length}</div>`}catch(err){document.getElementById('backupPreview').innerHTML='<p style="color:#ff4757;">Invalid backup file!</p>'}};reader.readAsText(file)}})}

        function performRestore(){const fileInput=document.getElementById('backupFile');const file=fileInput.files[0];if(!file){alert('Please select a backup file first!');return}if(!confirm('⚠️ This will DELETE all current data and replace with backup. Continue?'))return;if(!confirm('FINAL WARNING: Current data will be lost!'))return;const reader=new FileReader();reader.onload=function(event){try{const data=JSON.parse(event.target.result);DB.stores.forEach(s=>localStorage.removeItem('mlea_'+s));DB.init();DB.stores.forEach(s=>{if(data[s]){localStorage.setItem('mlea_'+s,JSON.stringify(data[s]))}});alert('✅ Data restored successfully! The app will now reload.');closeModal();location.reload()}catch(err){alert('❌ Error restoring backup: '+err.message)}};reader.readAsText(file)}

        function getLastBackupInfo(){const last=localStorage.getItem('mlea_last_backup');const auto=localStorage.getItem('mlea_auto_backup');let info='';if(last){const d=JSON.parse(last);info+=`Last manual backup: ${new Date(d.date).toLocaleString()}\n`}if(auto){const d=JSON.parse(auto);info+=`Last auto-backup: ${new Date(d.autoBackupDate).toLocaleString()}`}return info||'No backups yet. Use Download Backup to create one.'}

        function clearAllData(){if(!confirm('⚠️ DELETE ALL DATA? This cannot be undone!'))return;if(!confirm('FINAL WARNING: All products, sales, suppliers, expenses will be deleted!'))return;DB.stores.forEach(s=>localStorage.removeItem('mlea_'+s));cart=[];discountRate=0;currentUser=null;document.getElementById('mainApp').style.display='none';initApp();alert('🗑️ All data cleared. System reset.')}

        function autoBackup(){const data={};DB.stores.forEach(s=>data[s]=DB.getAll(s));data.autoBackupDate=new Date().toISOString();localStorage.setItem('mlea_auto_backup',JSON.stringify(data))}

        function closeModal(){document.getElementById('modal').classList.remove('active')}
        document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
        document.addEventListener('keydown',function(e){if(document.getElementById('loginScreen').style.display!=='none'){if(e.key>='0'&&e.key<='9')enterPin(e.key);else if(e.key==='Enter')submitPin();else if(e.key==='Backspace'){pinEntry=pinEntry.slice(0,-1);updatePinDisplay()}}});

        setInterval(autoBackup,5*60*1000);
        initApp();
    </script>
</body>
</html>
