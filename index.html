<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLEA POS - Multi-Branch</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
        .app-container{max-width:480px;margin:0 auto;min-height:100vh;background:#16213e;position:relative}
        @media(min-width:768px){.app-container{max-width:768px}}
        #loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:15px}
        .login-card{background:#1e2a4a;border-radius:20px;padding:20px;width:100%;max-width:360px;border:1px solid #2a3a5e}
        .login-logo{text-align:center;margin-bottom:20px}
        .login-logo h1{color:#9b8fff;font-size:1.8em}.login-logo p{color:#a0a0b0;font-size:.85em}
        .user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
        .user-card{background:#16213e;border:2px solid #2a3a5e;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
        .user-card.selected{border-color:#7c6fff;background:#0f3460}
        .user-card .avatar{font-size:1.8em}.user-card .name{font-size:.7em;color:#e0e0e0;margin-top:3px}
        .role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65em;margin-top:3px}
        .admin-badge{background:#7c6fff;color:#fff}.manager-badge{background:#2ed573;color:#fff}.cashier-badge{background:#ffa502;color:#fff}
        .section-label{text-align:center;color:#e0e0e0;font-size:.9em;margin:10px 0}
        .pin-display{display:flex;justify-content:center;gap:12px;margin:15px 0}
        .pin-dot{width:14px;height:14px;border-radius:50%;background:#2a3a5e;transition:all .3s}
        .pin-dot.filled{background:#7c6fff;box-shadow:0 0 8px #7c6fff}.pin-dot.error{background:#ff4757}
        .error-msg{color:#ff4757;text-align:center;font-size:.8em;min-height:18px;margin:5px 0}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .pin-btn{background:#0f3460;border:1px solid #2a3a5e;border-radius:10px;padding:16px;font-size:1.3em;cursor:pointer;color:#e0e0e0}
        .pin-btn:active{background:#7c6fff}.pin-btn.clear{background:#ff4757;color:#fff;font-size:.9em}.pin-btn.submit{background:#2ed573;color:#fff;font-size:.9em}
        #mainApp{display:none}
        .header{background:#1a1a2e;padding:12px 15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3a5e}
        .header h1{color:#9b8fff;font-size:1.2em}.header-right{display:flex;align-items:center;gap:10px;font-size:.8em;color:#a0a0b0}
        .logout-btn{background:#ff4757;color:#fff;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:.8em}
        .hamburger{background:none;border:none;color:#e0e0e0;font-size:22px;cursor:pointer}
        .nav-bar{display:flex;overflow-x:auto;padding:8px;background:#1e2a4a;margin:8px;border-radius:10px;gap:5px;-webkit-overflow-scrolling:touch}
        .nav-btn{flex:0 0 auto;padding:8px 14px;background:#16213e;border:1px solid #2a3a5e;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:.8em;color:#a0a0b0;position:relative}
        .nav-btn.active{background:#7c6fff;color:#fff;border-color:#7c6fff}
        .nav-btn .badge{position:absolute;top:-5px;right:-5px;background:#ff4757;color:#fff;border-radius:50%;padding:1px 6px;font-size:.65em;min-width:18px;text-align:center}
        #mainContent{padding:10px;min-height:60vh}
        .card{background:#1e2a4a;border-radius:10px;padding:15px;margin:8px 0;border:1px solid #2a3a5e}
        .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .metric-card{background:#16213e;border-radius:8px;padding:12px;text-align:center;border:1px solid #2a3a5e}
        .metric-value{font-size:1.1em;font-weight:bold;color:#9b8fff}.metric-label{font-size:.65em;color:#a0a0b0;margin-top:4px}
        .btn{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:500;transition:all .2s}
        .btn:active{transform:scale(.95)}.btn-primary{background:#7c6fff;color:#fff}.btn-success{background:#2ed573;color:#fff}.btn-danger{background:#ff4757;color:#fff}.btn-warning{background:#ffa502;color:#fff}.btn-sm{padding:5px 10px;font-size:.7em}.btn-xs{padding:3px 8px;font-size:.65em}
        input,select,textarea{width:100%;padding:10px;border:2px solid #2a3a5e;border-radius:20px;font-size:.9em;background:#0f3460;color:#e0e0e0;outline:none;font-family:inherit}
        input:focus,select:focus,textarea:focus{border-color:#7c6fff}input::placeholder{color:#6a6a7a}select option{background:#1e2a4a;color:#e0e0e0}
        table{width:100%;border-collapse:collapse;font-size:.8em}
        th{background:#0f3460;color:#9b8fff;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #2a3a5e;color:#a0a0b0}
        .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:260px;background:#1e2a4a;z-index:1000;transition:left .3s;overflow-y:auto;border-right:1px solid #2a3a5e}
        .sidebar.active{left:0}.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999}.sidebar-overlay.active{display:block}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:15px}
        .modal.active{display:flex}.modal-content{background:#1e2a4a;border-radius:15px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid #2a3a5e}
        .branch-tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:.7em;background:rgba(124,111,255,0.2);color:#9b8fff;margin-left:5px}
        .alert{background:rgba(255,71,87,.15);border:1px solid #ff4757;border-radius:8px;padding:10px;margin:8px 0}
        .alert-success{background:rgba(46,213,115,.15);border-color:#2ed573}
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loginScreen">
            <div class="login-card">
                <div class="login-logo"><h1>🏪 MLEA POS</h1><p>Multi-Branch System</p></div>
                <div class="section-label">👤 Select User</div>
                <div class="user-selector" id="userSelector"></div>
                <div class="section-label">🔢 Enter PIN</div>
                <div class="pin-display" id="pinDisplay"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="error-msg" id="errorMessage"></div>
                <div class="pin-pad">
                    <button class="pin-btn" onclick="enterPin('1')">1</button><button class="pin-btn" onclick="enterPin('2')">2</button><button class="pin-btn" onclick="enterPin('3')">3</button>
                    <button class="pin-btn" onclick="enterPin('4')">4</button><button class="pin-btn" onclick="enterPin('5')">5</button><button class="pin-btn" onclick="enterPin('6')">6</button>
                    <button class="pin-btn" onclick="enterPin('7')">7</button><button class="pin-btn" onclick="enterPin('8')">8</button><button class="pin-btn" onclick="enterPin('9')">9</button>
                    <button class="pin-btn clear" onclick="clearPin()">Clear</button><button class="pin-btn" onclick="enterPin('0')">0</button><button class="pin-btn submit" onclick="submitPin()">→</button>
                </div>
            </div>
        </div>
        <div id="mainApp">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
            <div class="sidebar" id="sidebar">
                <div style="padding:15px;background:#1a1a2e;border-bottom:1px solid #2a3a5e;">
                    <h3 style="color:#9b8fff;">MLEA POS</h3>
                    <p style="font-size:.75em;color:#a0a0b0;" id="sidebarUserInfo"></p>
                    <span class="role-badge" id="sidebarRole"></span>
                    <span class="branch-tag" id="sidebarBranch"></span>
                </div>
                <div style="padding:10px;display:flex;flex-direction:column;gap:3px;">
                    <button class="nav-btn" onclick="switchView('dashboard')">📊 Dashboard</button>
                    <button class="nav-btn" onclick="switchView('pos')">💻 POS Terminal</button>
                    <button class="nav-btn" id="navInventory" onclick="switchView('inventory')">📦 Inventory</button>
                    <button class="nav-btn" id="navSuppliers" onclick="switchView('suppliers')">🤝 Suppliers</button>
                    <button class="nav-btn" id="navPO" onclick="switchView('purchaseOrders')">📋 Purchase Orders</button>
                    <button class="nav-btn" id="navExpenses" onclick="switchView('expenses')">💸 Expenses</button>
                    <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>
                    <button class="nav-btn" id="navUsers" onclick="switchView('users')">👥 Users</button>
                    <button class="nav-btn" id="navBranches" onclick="switchView('branches')">🏢 Branches</button>
                    <button class="nav-btn" id="navReports" onclick="switchView('reports')">💾 Reports</button>
                </div>
            </div>
            <div class="header"><button class="hamburger" onclick="openSidebar()">☰</button><h1 id="headerTitle">MLEA POS</h1><div class="header-right"><span id="headerBranch"></span><span id="headerUser"></span><button class="logout-btn" onclick="logout()">🚪</button></div></div>
            <div class="nav-bar" id="navBar"></div>
            <div id="mainContent"><p style="text-align:center;padding:40px;color:#a0a0b0;">Loading...</p></div>
        </div>
    </div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        // ==================== DATABASE ====================
        const DB={
            stores:['products','sales','saleItems','suppliers','purchaseOrders','expenses','users','settings','inventoryLogs','branches'],
            init(){this.stores.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
            getAll(key){return JSON.parse(localStorage.getItem('mlea_'+key)||'[]')},
            set(key,data){localStorage.setItem('mlea_'+key,JSON.stringify(data))},
            add(key,item){const items=this.getAll(key);item.id=items.length>0?Math.max(...items.map(i=>i.id))+1:1;item.createdAt=new Date().toISOString();items.push(item);this.set(key,items);return item.id},
            update(key,item){const items=this.getAll(key);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item}this.set(key,items)},
            delete(key,id){this.set(key,this.getAll(key).filter(i=>i.id!==id))},
            getById(key,id){return this.getAll(key).find(i=>i.id===id)},
            // NEW: Get data filtered by branch
            getByBranch(key,branchId){return this.getAll(key).filter(i=>i.branchId===branchId)}
        };DB.init();

        const currencies={USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',decimals:2},PHP:{symbol:'₱',name:'Philippine Peso',flag:'🇵🇭',decimals:2},EUR:{symbol:'€',name:'Euro',flag:'🇪🇺',decimals:2},GBP:{symbol:'£',name:'British Pound',flag:'🇬🇧',decimals:2},JPY:{symbol:'¥',name:'Japanese Yen',flag:'🇯🇵',decimals:0},INR:{symbol:'₹',name:'Indian Rupee',flag:'🇮🇳',decimals:2},CNY:{symbol:'¥',name:'Chinese Yuan',flag:'🇨🇳',decimals:2},AUD:{symbol:'A$',name:'Australian Dollar',flag:'🇦🇺',decimals:2},SGD:{symbol:'S$',name:'Singapore Dollar',flag:'🇸🇬',decimals:2},MYR:{symbol:'RM',name:'Malaysian Ringgit',flag:'🇲🇾',decimals:2},AED:{symbol:'د.إ',name:'UAE Dirham',flag:'🇦🇪',decimals:2}};

        let currentUser=null,currentView='dashboard',currentCurrency='USD',taxRate=0.1,discountRate=0,discountType='percent';
        let cart=[],selectedUserId=null,pinEntry='',products=[],users=[],inventoryFilter='all',receiptFooter='Thank you for your business!';
        let currentBranch=null,branches=[];

        function formatCurrency(a){const c=currencies[currentCurrency];return c.decimals===0?c.symbol+' '+Math.round(a).toLocaleString():c.symbol+a.toFixed(2)}
        function getMyData(key){const all=DB.getAll(key);if(currentUser.role==='admin')return all;return all.filter(i=>i.branchId===currentUser.branchId)}
        function getMyBranchUsers(){return DB.getAll('users').filter(u=>u.branchId===currentUser.branchId||(currentUser.role==='admin'&&!u.branchId))}

        function initApp(){
            users=DB.getAll('users');
            branches=DB.getAll('branches');
            
            // Create default branch if none exists
            if(branches.length===0){
                DB.add('branches',{name:'Main Branch',address:'Head Office',phone:'555-0000'});
                branches=DB.getAll('branches');
            }
            
            // Create admin if no users exist
            if(users.length===0){
                DB.add('users',{name:'Admin',role:'admin',active:true,pin:'1234',branchId:null});
                users=DB.getAll('users');
            }
            
            // Sample products for Main Branch
            if(DB.getAll('products').length===0){
                [{sku:'SKU001',name:'Laptop',price:899.99,stock:15,category:'Electronics',active:true,barcode:'8901234567890',branchId:null},
                 {sku:'SKU002',name:'Mouse',price:24.99,stock:50,category:'Electronics',active:true,barcode:'8901234567891',branchId:null}].forEach(p=>DB.add('products',p));
            }
            
            updateBadges();renderLoginScreen();
        }

        function renderLoginScreen(){
            document.getElementById('loginScreen').style.display='flex';
            document.getElementById('mainApp').style.display='none';
            users=DB.getAll('users');
            document.getElementById('userSelector').innerHTML=users.filter(u=>u.active).map(u=>`
                <div class="user-card ${selectedUserId===u.id?'selected':''}" onclick="selectUser(${u.id})">
                    <div class="avatar">${u.role==='admin'?'👑':u.role==='manager'?'👨‍💼':'👤'}</div>
                    <div class="name">${u.name}</div>
                    <span class="role-badge ${u.role}-badge">${u.role}</span>
                    ${u.branchId?`<div style="font-size:.55em;color:#9b8fff;">${DB.getById('branches',u.branchId)?.name||'Branch'}</div>`:''}
                </div>
            `).join('');
        }
        function selectUser(id){selectedUserId=id;pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';renderLoginScreen()}
        function enterPin(d){if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}if(pinEntry.length<4){pinEntry+=d;updatePinDisplay()}}
        function clearPin(){pinEntry='';updatePinDisplay()}
        function updatePinDisplay(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error')})}
        
        function submitPin(){
            if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}
            const user=users.find(u=>u.id===selectedUserId);
            if(user&&user.pin===pinEntry){
                currentUser=user;
                currentBranch=user.branchId?DB.getById('branches',user.branchId):null;
                
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('mainApp').style.display='block';
                document.getElementById('headerUser').textContent=user.name;
                document.getElementById('headerBranch').textContent=currentBranch?`🏢 ${currentBranch.name}`:'🏢 All Branches';
                document.getElementById('headerTitle').textContent=currentBranch?`${currentBranch.name} POS`:'MLEA POS Admin';
                document.getElementById('sidebarUserInfo').textContent=`${user.name} (${user.role})`;
                document.getElementById('sidebarBranch').textContent=currentBranch?currentBranch.name:'Admin';
                
                const sr=document.getElementById('sidebarRole');
                sr.textContent=user.role;sr.className='role-badge '+user.role+'-badge';
                
                // Show/hide admin-only features
                const adminOnly=['navBranches'];
                const managerHide=['navBranches'];
                
                adminOnly.forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=user.role==='admin'?'block':'none'});
                
                pinEntry='';selectedUserId=null;updatePinDisplay();updateBadges();
                switchView('dashboard');
            }else{
                document.getElementById('errorMessage').textContent='Wrong PIN!';
                pinEntry='';updatePinDisplay();
                document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
                setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')),400);
            }
        }
        function logout(){if(cart.length>0&&!confirm('Cart has items. Logout anyway?'))return;currentUser=null;currentBranch=null;cart=[];discountRate=0;document.getElementById('mainApp').style.display='none';closeSidebar();renderLoginScreen()}

        function openSidebar(){document.getElementById('sidebar').classList.add('active');document.getElementById('sidebarOverlay').classList.add('active')}
        function closeSidebar(){document.getElementById('sidebar').classList.remove('active');document.getElementById('sidebarOverlay').classList.remove('active')}
        
        function switchView(view){
            currentView=view;closeSidebar();updateBadges();
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            const content=document.getElementById('mainContent');
            switch(view){
                case 'dashboard':renderDashboard(content);break;
                case 'pos':renderPOS(content);break;
                case 'inventory':renderInventory(content);break;
                case 'suppliers':renderSuppliers(content);break;
                case 'purchaseOrders':renderPurchaseOrders(content);break;
                case 'expenses':renderExpenses(content);break;
                case 'settings':renderSettings(content);break;
                case 'users':renderUsers(content);break;
                case 'branches':renderBranches(content);break;
                case 'reports':renderReports(content);break;
                default:renderDashboard(content);
            }
        }

        // ==================== BRANCH MANAGEMENT (ADMIN ONLY) ====================
        function renderBranches(el){
            if(currentUser.role!=='admin'){el.innerHTML='<p style="text-align:center;color:#ff4757;padding:20px;">🔒 Admin only</p>';return}
            branches=DB.getAll('branches');
            const allUsers=DB.getAll('users');
            el.innerHTML=`
                <h4>🏢 Branch Management</h4>
                <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddBranch()">+ Add Branch</button>
                ${branches.map(b=>{
                    const branchUsers=allUsers.filter(u=>u.branchId===b.id);
                    const branchManagers=branchUsers.filter(u=>u.role==='manager');
                    const branchCashiers=branchUsers.filter(u=>u.role==='cashier');
                    return`
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h4>🏢 ${b.name}</h4>
                            <span style="font-size:.7em;color:#a0a0b0;">ID: ${b.id}</span>
                        </div>
                        <p style="color:#a0a0b0;font-size:.8em;">📍 ${b.address||'No address'} | 📞 ${b.phone||'No phone'}</p>
                        <div style="display:flex;gap:10px;font-size:.75em;margin:5px 0;">
                            <span>👨‍💼 Managers: ${branchManagers.length}</span>
                            <span>👤 Cashiers: ${branchCashiers.length}</span>
                        </div>
                        <div style="display:flex;gap:5px;flex-wrap:wrap;">
                            ${branchManagers.map(m=>`<span class="role-badge manager-badge" style="font-size:.65em;">${m.name}</span>`).join('')}
                            ${branchCashiers.map(c=>`<span class="role-badge cashier-badge" style="font-size:.65em;">${c.name}</span>`).join('')}
                        </div>
                        <div style="display:flex;gap:5px;margin-top:8px;">
                            <button class="btn btn-primary btn-sm" onclick="showAddBranchUser(${b.id})">+ Add User</button>
                            <button class="btn btn-warning btn-sm" onclick="editBranch(${b.id})">✎ Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteBranch(${b.id})">🗑️</button>
                        </div>
                    </div>`;
                }).join('')}
            `;
        }

        function showAddBranch(){
            document.getElementById('modalContent').innerHTML=`
                <h4>Add Branch</h4>
                <div class="form-group"><label>Branch Name *</label><input type="text" id="bName" placeholder="e.g., Downtown Branch"></div>
                <div class="form-group"><label>Address</label><input type="text" id="bAddress"></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="bPhone"></div>
                <button class="btn btn-primary" onclick="addBranch()">💾 Save Branch</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addBranch(){
            const name=document.getElementById('bName').value;
            if(!name){alert('Branch name required!');return}
            const branch={name,address:document.getElementById('bAddress').value,phone:document.getElementById('bPhone').value};
            const branchId=DB.add('branches',branch);
            branches=DB.getAll('branches');
            closeModal();
            
            // Ask if they want to create a manager for this branch
            if(confirm(`Branch "${name}" created! Add a manager now?`)){
                showAddBranchUser(branchId);
            }else{
                switchView('branches');
            }
        }

        function showAddBranchUser(branchId){
            const branch=DB.getById('branches',branchId);
            document.getElementById('modalContent').innerHTML=`
                <h4>Add User to ${branch?.name||'Branch'}</h4>
                <div class="form-group"><label>Name *</label><input type="text" id="uName"></div>
                <div class="form-group"><label>Role</label>
                    <select id="uRole">
                        <option value="manager">Manager</option>
                        <option value="cashier">Cashier</option>
                    </select>
                </div>
                <div class="form-group"><label>4-digit PIN *</label><input type="password" id="uPin" maxlength="4"></div>
                <button class="btn btn-primary" onclick="addBranchUser(${branchId})">💾 Save User</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addBranchUser(branchId){
            const name=document.getElementById('uName').value;
            const pin=document.getElementById('uPin').value;
            const role=document.getElementById('uRole').value;
            if(!name||pin.length!==4){alert('Name and 4-digit PIN required!');return}
            DB.add('users',{name,role,active:true,pin,branchId});
            users=DB.getAll('users');
            closeModal();switchView('branches');renderLoginScreen();
        }

        function editBranch(id){
            const b=DB.getById('branches',id);
            document.getElementById('modalContent').innerHTML=`
                <h4>Edit Branch</h4>
                <div class="form-group"><label>Name</label><input type="text" id="bName" value="${b.name}"></div>
                <div class="form-group"><label>Address</label><input type="text" id="bAddress" value="${b.address||''}"></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="bPhone" value="${b.phone||''}"></div>
                <button class="btn btn-primary" onclick="saveBranch(${id})">💾 Save</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function saveBranch(id){
            const b=DB.getById('branches',id);
            b.name=document.getElementById('bName').value;
            b.address=document.getElementById('bAddress').value;
            b.phone=document.getElementById('bPhone').value;
            DB.update('branches',b);branches=DB.getAll('branches');
            closeModal();switchView('branches');
        }

        function deleteBranch(id){
            const branchUsers=DB.getAll('users').filter(u=>u.branchId===id);
            if(branchUsers.length>0){
                alert(`Cannot delete branch with ${branchUsers.length} users. Remove all users first.`);
                return;
            }
            if(confirm('Delete this branch?')){
                DB.delete('branches',id);branches=DB.getAll('branches');
                switchView('branches');
            }
        }

        // ==================== USER MANAGEMENT WITH BRANCH ISOLATION ====================
        function renderUsers(el){
            // Admin sees all users, Manager sees only their branch
            if(currentUser.role==='cashier'){el.innerHTML='<p style="text-align:center;color:#ff4757;padding:20px;">🔒 Access denied</p>';return}
            
            users=DB.getAll('users');
            let visibleUsers;
            
            if(currentUser.role==='admin'){
                visibleUsers=users;
            }else{
                // Manager sees only their branch users
                visibleUsers=users.filter(u=>u.branchId===currentUser.branchId);
            }
            
            const canAdd=currentUser.role==='admin'||currentUser.role==='manager';
            
            el.innerHTML=`
                <h4>👥 User Management</h4>
                <p style="color:#a0a0b0;font-size:.75em;margin-bottom:10px;">
                    ${currentUser.role==='admin'?'👑 Viewing ALL branches':`🏢 Branch: ${currentBranch?.name||'Unknown'}`}
                </p>
                ${canAdd?`<button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddBranchUser(${currentUser.branchId||''})">+ Add User to ${currentBranch?currentBranch.name:'Branch'}</button>`:''}
                ${visibleUsers.map(u=>{
                    const userBranch=u.branchId?DB.getById('branches',u.branchId):null;
                    const canEdit=currentUser.role==='admin'||(currentUser.role==='manager'&&u.branchId===currentUser.branchId&&u.role==='cashier');
                    
                    return`
                    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <strong>${u.name}</strong>
                            <span class="role-badge ${u.role}-badge">${u.role}</span>
                            <span>${u.active?'✅':'❌'}</span>
                            ${userBranch?`<span class="branch-tag">🏢 ${userBranch.name}</span>`:'<span class="branch-tag">🌐 Admin</span>'}
                            ${currentUser.role==='admin'?`<div style="font-size:.7em;color:#a0a0b0;">PIN: ${u.pin}</div>`:''}
                        </div>
                        <div style="display:flex;gap:3px;">
                            ${canEdit?`
                                <button class="btn btn-primary btn-xs" onclick="editUser(${u.id})">✎</button>
                                <button class="btn btn-danger btn-xs" onclick="deleteUser(${u.id})">🗑️</button>
                                <button class="btn btn-warning btn-xs" onclick="toggleUser(${u.id})">${u.active?'Deact':'Act'}</button>
                            `:'<span style="color:#ff4757;font-size:.65em;">🔒</span>'}
                        </div>
                    </div>`;
                }).join('')}
            `;
        }

        function deleteUser(id){
            const user=DB.getById('users',id);
            if(!user)return;
            
            // Permission checks
            if(currentUser.role==='cashier'){alert('Access denied');return}
            if(user.id===currentUser.id){alert('Cannot delete yourself!');return}
            if(currentUser.role==='manager'){
                if(user.branchId!==currentUser.branchId){alert('Cannot delete users from other branches!');return}
                if(user.role!=='cashier'){alert('Managers can only delete cashiers!');return}
            }
            
            if(confirm(`Delete ${user.name}?`)){
                DB.delete('users',id);users=DB.getAll('users');
                switchView('users');renderLoginScreen();
            }
        }

        function toggleUser(id){
            const user=DB.getById('users',id);
            if(!user)return;
            if(currentUser.role==='manager'){
                if(user.branchId!==currentUser.branchId){alert('Cannot modify users from other branches!');return}
                if(user.role!=='cashier'){alert('Managers can only modify cashiers!');return}
            }
            if(user.id===currentUser.id&&user.active){alert('Cannot deactivate yourself!');return}
            user.active=!user.active;DB.update('users',user);users=DB.getAll('users');
            switchView('users');renderLoginScreen();
        }

        // ==================== DASHBOARD WITH BRANCH ISOLATION ====================
        function renderDashboard(el){
            let sales=DB.getAll('sales')||[];
            
            // Filter by branch for non-admin
            if(currentUser.role!=='admin'){
                sales=sales.filter(s=>s.branchId===currentUser.branchId);
            }
            
            const today=new Date().toISOString().split('T')[0];
            const todaySales=sales.filter(s=>s.date===today).reduce((s,i)=>s+i.total,0);
            const monthSales=sales.filter(s=>s.date.startsWith(today.substring(0,7))).reduce((s,i)=>s+i.total,0);
            const monthTax=sales.filter(s=>s.date.startsWith(today.substring(0,7))).reduce((s,i)=>s+i.tax,0);
            
            // Branch-specific products
            const myProducts=currentUser.role==='admin'?DB.getAll('products'):DB.getAll('products').filter(p=>!p.branchId||p.branchId===currentUser.branchId);
            const lowStock=myProducts.filter(p=>p.active&&p.stock<10).length;
            
            el.innerHTML=`
                <div class="metrics">
                    <div class="metric-card"><div class="metric-value">${formatCurrency(todaySales)}</div><div class="metric-label">Today's Sales</div></div>
                    <div class="metric-card"><div class="metric-value">${formatCurrency(monthSales)}</div><div class="metric-label">Monthly Revenue</div></div>
                    <div class="metric-card"><div class="metric-value">${formatCurrency(monthTax)}</div><div class="metric-label">Tax Collected</div></div>
                </div>
                <div class="card">
                    <h4>Welcome, ${currentUser.name}! 👋</h4>
                    <p style="color:#a0a0b0;font-size:.8em;">
                        ${currentBranch?`🏢 Branch: ${currentBranch.name}`:'👑 Admin - All Branches'} | 
                        Role: ${currentUser.role} | Currency: ${currencies[currentCurrency].flag} ${currentCurrency}
                    </p>
                </div>
                ${currentUser.role==='admin'?renderAdminOverview():''}
                ${lowStock>0?`<div class="alert" style="border-color:#ffa502;background:rgba(255,165,2,.15);">⚠️ ${lowStock} products low on stock!</div>`:''}
            `;
        }

        function renderAdminOverview(){
            branches=DB.getAll('branches');
            const allSales=DB.getAll('sales')||[];
            const today=new Date().toISOString().split('T')[0];
            const thisMonth=today.substring(0,7);
            
            let html='<div class="card"><h5>🏢 Branch Summary</h5>';
            branches.forEach(b=>{
                const branchUsers=DB.getAll('users').filter(u=>u.branchId===b.id);
                const branchSales=allSales.filter(s=>s.branchId===b.id);
                const monthSales=branchSales.filter(s=>s.date.startsWith(thisMonth)).reduce((s,i)=>s+i.total,0);
                html+=`
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #2a3a5e;">
                        <span>🏢 ${b.name}</span>
                        <span style="color:#9b8fff;">${formatCurrency(monthSales)}</span>
                        <span style="font-size:.7em;color:#a0a0b0;">${branchUsers.length} users</span>
                    </div>`;
            });
            html+='</div>';
            return html;
        }

        // ==================== POS WITH BRANCH TRACKING ====================
        function renderPOS(el){
            let myProducts=currentUser.role==='admin'?DB.getAll('products'):DB.getAll('products').filter(p=>!p.branchId||p.branchId===currentUser.branchId);
            const activeProducts=myProducts.filter(p=>p.active);
            const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
            const discount=discountType==='percent'?subtotal*(discountRate/100):discountRate;
            const afterDiscount=Math.max(0,subtotal-discount);
            const tax=afterDiscount*taxRate;
            const total=afterDiscount+tax;
            
            el.innerHTML=`
                <input type="text" id="scanInput" placeholder="🔍 Scan barcode..." onkeypress="if(event.key==='Enter'){addToCart(event.target.value);event.target.value='';}">
                <div class="product-grid">${activeProducts.slice(0,8).map(p=>`
                    <div class="product-card" onclick="addToCart('${p.sku}')"><strong>${p.name}</strong><div style="color:#9b8fff;">${formatCurrency(p.price)}</div><small>Stock: ${p.stock}</small></div>
                `).join('')}</div>
                <div class="card" style="margin-top:10px;"><h4>🛒 Cart (${cart.length})</h4>
                    ${cart.map((item,i)=>`<div class="cart-item"><span>${item.name} x${item.quantity}</span><span>${formatCurrency(item.price*item.quantity)}</span><button class="btn btn-danger btn-xs" onclick="removeFromCart(${i})">✕</button></div>`).join('')||'<p style="color:#a0a0b0;text-align:center;">Empty</p>'}
                    <hr style="border-color:#2a3a5e;"><div>Total: <strong style="color:#9b8fff;font-size:1.2em;">${formatCurrency(total)}</strong></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
                        <button class="btn btn-success" onclick="processPayment('cash')">💵 Cash</button>
                        <button class="btn btn-primary" onclick="processPayment('card')">💳 Card</button>
                    </div>
                </div>
            `;
            if(document.getElementById('scanInput'))document.getElementById('scanInput').focus();
        }

        function addToCart(sku){
            const myProducts=currentUser.role==='admin'?DB.getAll('products'):DB.getAll('products').filter(p=>!p.branchId||p.branchId===currentUser.branchId);
            const product=myProducts.find(p=>(p.sku===sku||p.barcode===sku)&&p.active);
            if(product&&product.stock>0){
                const existing=cart.find(i=>i.sku===product.sku);
                if(existing){existing.quantity++}else{cart.push({...product,quantity:1})}
                switchView('pos');
            }else{alert('Product not found!')}
        }
        function removeFromCart(i){cart.splice(i,1);switchView('pos')}
        
        function processPayment(method){
            if(cart.length===0){alert('Cart is empty!');return}
            const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
            const total=subtotal+(subtotal*taxRate);
            const sale={
                date:new Date().toISOString().split('T')[0],total,subtotal,tax:subtotal*taxRate,
                paymentMethod:method,cashierId:currentUser.id,cashierName:currentUser.name,
                branchId:currentUser.branchId,currency:currentCurrency
            };
            const saleId=DB.add('sales',sale);
            cart.forEach(item=>{
                const product=DB.getById('products',item.id);
                if(product){product.stock-=item.quantity;DB.update('products',product)}
            });
            document.getElementById('modalContent').innerHTML=`<div style="text-align:center;color:#fff;"><h3>✅ Sale Complete!</h3><h2 style="color:#9b8fff;">${formatCurrency(total)}</h2><p>Receipt #${saleId}</p></div>`;
            document.getElementById('modal').classList.add('active');
            cart=[];discountRate=0;updateBadges();
            setTimeout(()=>{document.getElementById('modal').classList.remove('active');switchView('dashboard')},2000);
        }

        function updateBadges(){}
        function closeModal(){document.getElementById('modal').classList.remove('active')}
        document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
        document.addEventListener('keydown',function(e){if(document.getElementById('loginScreen').style.display!=='none'){if(e.key>='0'&&e.key<='9')enterPin(e.key);else if(e.key==='Enter')submitPin();else if(e.key==='Backspace'){pinEntry=pinEntry.slice(0,-1);updatePinDisplay()}}});

        initApp();
    </script>
</body>
</html>
