<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLEA POS — BIR-Ready Point of Sale for Filipino Businesses</title>
<meta name="description" content="Stop losing money to manual sales tracking. MLEA POS is an offline-ready, BIR-compliant point of sale system built for Philippine small businesses. Works on any device, no monthly fees.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#16130d;          /* near-black warm ink */
  --ink-soft:#2a2419;
  --paper:#f7f3ea;        /* warm receipt paper */
  --paper-dim:#ece5d6;
  --gold:#c8962e;         /* MLEA gold, deepened for contrast on paper */
  --gold-bright:#e3b34c;
  --emerald:#1f7a5c;
  --rose:#c0445a;
  --line:rgba(22,19,13,.12);
  --line-strong:rgba(22,19,13,.25);
  --ff-display:'Fraunces',Georgia,serif;
  --ff-body:'Inter',system-ui,sans-serif;
  --ff-mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--ff-body);
  background:var(--paper);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px}
a{color:inherit}
img{max-width:100%}

/* ── perforated receipt edge helper ── */
.perf{
  position:relative;
}
.perf::after{
  content:'';position:absolute;left:0;right:0;bottom:-9px;height:9px;
  background:
    radial-gradient(circle at 9px 0, transparent 7px, var(--paper) 7.5px) repeat-x;
  background-size:18px 9px;
}

/* ── NAV ── */
header.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(247,243,234,.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;max-width:1180px;margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--ff-display);font-weight:900;font-size:1.15rem;letter-spacing:-.01em}
.brand .mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-bright));display:grid;place-items:center;font-size:18px;box-shadow:0 2px 10px rgba(200,150,46,.4)}
.nav-links{display:flex;gap:26px;align-items:center;font-size:.92rem;font-weight:500}
.nav-links a{text-decoration:none;color:var(--ink-soft);transition:color .15s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:999px;font-weight:600;text-decoration:none;font-size:.9rem;transition:transform .15s,background .15s}
.nav-cta:hover{background:var(--gold);color:var(--ink);transform:translateY(-1px)}
@media(max-width:760px){.nav-links a:not(.nav-cta){display:none}}

/* ── HERO ── */
.hero{padding:72px 0 60px;position:relative}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:54px;align-items:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--ff-mono);font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:22px}
.eyebrow::before{content:'';width:26px;height:1px;background:var(--gold)}
.hero h1{
  font-family:var(--ff-display);
  font-weight:900;
  font-size:clamp(2.5rem,5.4vw,4.1rem);
  line-height:1.02;
  letter-spacing:-.025em;
  margin-bottom:22px;
}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero .sub{font-size:1.18rem;color:var(--ink-soft);max-width:30ch;margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn-primary{
  background:var(--ink);color:var(--paper);
  padding:15px 28px;border-radius:999px;font-weight:600;font-size:1rem;
  text-decoration:none;display:inline-flex;align-items:center;gap:9px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 6px 20px rgba(22,19,13,.2);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(22,19,13,.28)}
.btn-ghost{
  padding:15px 24px;border-radius:999px;font-weight:600;font-size:1rem;
  text-decoration:none;border:1.5px solid var(--line-strong);
  transition:border-color .15s,color .15s;
}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.hero-trust{margin-top:26px;display:flex;gap:22px;flex-wrap:wrap;font-size:.86rem;color:var(--ink-soft)}
.hero-trust span{display:flex;align-items:center;gap:7px}
.hero-trust b{color:var(--emerald)}

/* ── RECEIPT (hero signature) ── */
.receipt{
  background:#fffdf8;
  border-radius:4px;
  padding:30px 26px 38px;
  font-family:var(--ff-mono);
  font-size:.82rem;
  color:var(--ink);
  box-shadow:0 24px 60px rgba(22,19,13,.22),0 4px 14px rgba(22,19,13,.1);
  position:relative;
  transform:rotate(1.4deg);
  max-width:340px;
  margin:0 auto;
}
.receipt::before,.receipt::after{
  content:'';position:absolute;left:0;right:0;height:8px;
  background:radial-gradient(circle at 8px 4px,transparent 6px,#fffdf8 6.5px) repeat-x;
  background-size:16px 8px;
}
.receipt::before{top:-7px;transform:rotate(180deg)}
.receipt::after{bottom:-7px}
.r-center{text-align:center}
.r-logo{font-family:var(--ff-display);font-weight:900;font-size:1.3rem;letter-spacing:-.01em}
.r-dim{color:#8a8273;font-size:.72rem}
.r-hr{border:none;border-top:1px dashed var(--line-strong);margin:12px 0}
.r-row{display:flex;justify-content:space-between;padding:3px 0}
.r-total{display:flex;justify-content:space-between;font-weight:700;font-size:1rem;padding-top:8px}
.r-total .amt{color:var(--gold)}
.r-stamp{
  display:inline-block;border:2px solid var(--emerald);color:var(--emerald);
  padding:3px 14px;border-radius:5px;font-weight:700;letter-spacing:.18em;
  transform:rotate(-6deg);margin-top:14px;font-size:.86rem;
}
.r-barcode{margin-top:16px;height:34px;background:repeating-linear-gradient(90deg,var(--ink) 0 2px,transparent 2px 4px,var(--ink) 4px 5px,transparent 5px 9px);opacity:.85}
.r-bir{font-size:.62rem;color:#8a8273;margin-top:12px;line-height:1.7}

@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr;gap:44px}
  .receipt{transform:rotate(0);margin-top:8px}
  .hero .sub{max-width:none}
}

/* ── PROBLEM SECTION ── */
.section{padding:84px 0}
.sec-head{max-width:640px;margin-bottom:48px}
.sec-eyebrow{font-family:var(--ff-mono);font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px}
.sec-head h2{font-family:var(--ff-display);font-weight:700;font-size:clamp(1.9rem,3.6vw,2.8rem);line-height:1.08;letter-spacing:-.02em}
.sec-head h2 em{font-style:italic;color:var(--gold)}
.sec-head p{font-size:1.1rem;color:var(--ink-soft);margin-top:16px}

.problems{background:var(--ink);color:var(--paper);border-radius:24px;padding:56px 48px}
.problems .sec-eyebrow{color:var(--gold-bright)}
.problems h2{color:var(--paper)}
.prob-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;margin-top:42px}
.prob{display:flex;gap:16px;align-items:flex-start}
.prob .x{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:rgba(192,68,90,.18);color:#ff8497;display:grid;place-items:center;font-weight:700;font-size:1rem}
.prob h3{font-family:var(--ff-display);font-weight:600;font-size:1.12rem;margin-bottom:5px}
.prob p{color:rgba(247,243,234,.62);font-size:.95rem}
@media(max-width:680px){.prob-grid{grid-template-columns:1fr}.problems{padding:40px 26px}}

/* ── SOLUTION / FEATURES ── */
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:8px}
.feat{
  background:#fffdf8;border:1px solid var(--line);border-radius:18px;padding:30px 26px;
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.feat:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(22,19,13,.1);border-color:var(--gold)}
.feat .ic{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,rgba(200,150,46,.16),rgba(200,150,46,.06));display:grid;place-items:center;font-size:24px;margin-bottom:18px}
.feat h3{font-family:var(--ff-display);font-weight:600;font-size:1.22rem;margin-bottom:9px;letter-spacing:-.01em}
.feat p{color:var(--ink-soft);font-size:.96rem}
@media(max-width:860px){.features{grid-template-columns:1fr}}

/* ── HOW (sequence — genuinely ordered) ── */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;margin-top:8px;counter-reset:step}
.step{position:relative;padding-top:18px;border-top:2px solid var(--ink)}
.step .n{font-family:var(--ff-mono);font-size:.8rem;font-weight:700;color:var(--gold);letter-spacing:.1em}
.step h3{font-family:var(--ff-display);font-weight:600;font-size:1.3rem;margin:10px 0 8px;letter-spacing:-.01em}
.step p{color:var(--ink-soft);font-size:.98rem}
@media(max-width:760px){.steps{grid-template-columns:1fr;gap:22px}}

/* ── BUILT FOR (verticals) ── */
.verticals{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}
.vert{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--paper-dim);border:1px solid var(--line);
  padding:11px 18px;border-radius:999px;font-weight:500;font-size:.95rem;
}
.vert .e{font-size:1.15rem}

/* ── PRICING ── */
.pricing-wrap{background:var(--paper-dim);border-radius:24px;padding:56px 0}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:46px}
.plan{
  background:#fffdf8;border:1px solid var(--line);border-radius:20px;padding:34px 30px;
  display:flex;flex-direction:column;position:relative;
}
.plan.featured{border:2px solid var(--gold);box-shadow:0 18px 50px rgba(200,150,46,.22)}
.plan .badge{position:absolute;top:-13px;left:30px;background:var(--gold);color:var(--ink);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 14px;border-radius:999px;font-family:var(--ff-mono)}
.plan h3{font-family:var(--ff-display);font-weight:700;font-size:1.4rem;margin-bottom:6px}
.plan .ptag{color:var(--ink-soft);font-size:.9rem;margin-bottom:20px;min-height:40px}
.plan .price{font-family:var(--ff-display);font-weight:900;font-size:2.6rem;letter-spacing:-.02em;line-height:1}
.plan .price small{font-size:.95rem;font-weight:500;color:var(--ink-soft);font-family:var(--ff-body)}
.plan .once{font-family:var(--ff-mono);font-size:.72rem;color:var(--emerald);font-weight:700;letter-spacing:.06em;margin-top:6px;text-transform:uppercase}
.plan ul{list-style:none;margin:24px 0 28px;display:flex;flex-direction:column;gap:11px}
.plan li{display:flex;gap:10px;align-items:flex-start;font-size:.95rem;color:var(--ink-soft)}
.plan li .ck{color:var(--emerald);font-weight:700;flex-shrink:0}
.plan .buy{margin-top:auto;text-align:center;padding:14px;border-radius:12px;font-weight:600;text-decoration:none;font-size:1rem;transition:transform .15s,background .15s}
.plan .buy.dark{background:var(--ink);color:var(--paper)}
.plan .buy.dark:hover{background:var(--gold);color:var(--ink);transform:translateY(-2px)}
.plan .buy.gold{background:var(--gold);color:var(--ink)}
.plan .buy.gold:hover{background:var(--gold-bright);transform:translateY(-2px)}
.price-note{text-align:center;margin-top:30px;font-size:.9rem;color:var(--ink-soft)}
@media(max-width:860px){.price-grid{grid-template-columns:1fr;max-width:420px;margin:46px auto 0}}

/* ── TRIAL CTA ── */
.trial{background:var(--ink);color:var(--paper);border-radius:24px;padding:60px 48px;text-align:center;position:relative;overflow:hidden}
.trial::before{content:'';position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(200,150,46,.18),transparent 70%);top:-160px;right:-100px}
.trial h2{font-family:var(--ff-display);font-weight:700;font-size:clamp(1.8rem,3.4vw,2.6rem);letter-spacing:-.02em;position:relative}
.trial p{color:rgba(247,243,234,.7);max-width:48ch;margin:16px auto 30px;font-size:1.08rem;position:relative}
.trial .btn-primary{background:var(--gold);color:var(--ink);position:relative}
.trial .btn-primary:hover{background:var(--gold-bright)}

/* ── FAQ ── */
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 40px;margin-top:8px}
.faq h3{font-family:var(--ff-display);font-weight:600;font-size:1.12rem;margin-bottom:7px}
.faq p{color:var(--ink-soft);font-size:.96rem}
@media(max-width:760px){.faq-grid{grid-template-columns:1fr}}

/* ── BUY / CONTACT ── */
.buybox{background:#fffdf8;border:2px solid var(--gold);border-radius:22px;padding:44px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.buybox h2{font-family:var(--ff-display);font-weight:700;font-size:1.9rem;letter-spacing:-.02em;margin-bottom:12px}
.buybox p{color:var(--ink-soft);margin-bottom:18px}
.pay-row{display:flex;align-items:center;gap:14px;background:var(--paper-dim);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.pay-row .pi{font-size:1.6rem}
.pay-row .pl{font-family:var(--ff-mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
.pay-row .pv{font-weight:700;font-size:1.05rem}
.paypal-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#003087;color:#fff;padding:15px;border-radius:12px;font-weight:700;text-decoration:none;font-size:1.05rem;transition:transform .15s,filter .15s}
.paypal-btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
.paypal-btn .pp-i{font-style:italic;font-weight:900;font-family:var(--ff-display)}
.buybox .steps-mini{font-size:.9rem;color:var(--ink-soft);margin-top:16px;line-height:1.8}
.buybox .steps-mini b{color:var(--ink)}
@media(max-width:760px){.buybox{grid-template-columns:1fr;padding:32px 26px}}

/* ── FOOTER ── */
footer{border-top:1px solid var(--line);padding:46px 0 60px;margin-top:20px}
.foot-in{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;flex-wrap:wrap}
.foot-brand{max-width:320px}
.foot-brand .brand{margin-bottom:12px}
.foot-brand p{color:var(--ink-soft);font-size:.92rem}
.foot-col h4{font-family:var(--ff-mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:14px}
.foot-col a{display:block;text-decoration:none;color:var(--ink);font-size:.95rem;margin-bottom:9px;transition:color .15s}
.foot-col a:hover{color:var(--gold)}
.foot-bottom{margin-top:40px;padding-top:22px;border-top:1px solid var(--line);font-size:.84rem;color:var(--ink-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

/* reveal on scroll */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.receipt{transform:none}}

:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}

.hide{display:none !important}
.admin-dot{position:fixed;bottom:14px;right:16px;font-size:.7rem;color:var(--ink-soft);text-decoration:none;opacity:.45;font-family:var(--ff-mono)}
.admin-dot:hover{opacity:1;color:var(--gold)}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-in">
    <div class="brand"><span class="mark" data-c="brand.icon">🏪</span> <span data-c="brand.name">MLEA&nbsp;POS</span></div>
    <nav class="nav-links" id="navLinks"><!-- rendered --></nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <span class="eyebrow" data-c="hero.eyebrow"></span>
      <h1 data-c="hero.title" data-html="1"></h1>
      <p class="sub" data-c="hero.subtitle"></p>
      <div class="hero-cta" id="heroCta"><!-- rendered --></div>
      <div class="hero-trust" id="heroTrust"><!-- rendered --></div>
    </div>
    <div>
      <div class="receipt" role="img" aria-label="Sample official receipt printed by MLEA POS">
        <div class="r-center">
          <div class="r-logo" data-c="hero.receipt.shopName"></div>
          <div class="r-dim" data-c="hero.receipt.shopSub"></div>
          <div class="r-dim" data-c="hero.receipt.tin"></div>
        </div>
        <hr class="r-hr">
        <div class="r-center r-dim" style="font-weight:700;letter-spacing:.1em">OFFICIAL RECEIPT</div>
        <div class="r-center r-dim" data-c="hero.receipt.orNo"></div>
        <hr class="r-hr">
        <div id="receiptLines"><!-- rendered --></div>
        <hr class="r-hr">
        <div class="r-row r-dim"><span>VATable Sales</span><span data-c="hero.receipt.vatable"></span></div>
        <div class="r-row r-dim"><span>VAT (12%)</span><span data-c="hero.receipt.vat"></span></div>
        <div class="r-total"><span>TOTAL</span><span class="amt" data-c="hero.receipt.total"></span></div>
        <div class="r-row r-dim" style="margin-top:8px"><span>Cash</span><span data-c="hero.receipt.cash"></span></div>
        <div class="r-row r-dim"><span>Change</span><span data-c="hero.receipt.change"></span></div>
        <div class="r-center"><span class="r-stamp">PAID</span></div>
        <div class="r-barcode"></div>
        <div class="r-center r-bir">
          <span data-c="hero.receipt.birline"></span><br>
          <span data-c="hero.receipt.poweredby"></span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- PROBLEMS -->
<section class="section" id="problems">
  <div class="wrap">
    <div class="problems reveal">
      <div class="sec-eyebrow" data-c="spotlight.eyebrow"></div>
      <h2 data-c="spotlight.title" data-html="1"></h2>
      <div class="prob-grid" id="spotGrid"><!-- rendered --></div>
    </div>
  </div>
</section>

<!-- FEATURES -->
<section class="section" id="features">
  <div class="wrap">
    <div class="sec-head reveal">
      <div class="sec-eyebrow" data-c="features.eyebrow"></div>
      <h2 data-c="features.title" data-html="1"></h2>
      <p data-c="features.subtitle"></p>
    </div>
    <div class="features" id="featGrid"><!-- rendered --></div>
    <div class="verticals reveal" id="vertList"><!-- rendered --></div>
  </div>
</section>

<!-- HOW -->
<section class="section" id="how">
  <div class="wrap">
    <div class="sec-head reveal">
      <div class="sec-eyebrow" data-c="steps.eyebrow"></div>
      <h2 data-c="steps.title" data-html="1"></h2>
    </div>
    <div class="steps" id="stepGrid"><!-- rendered --></div>
  </div>
</section>

<!-- PRICING -->
<section class="section" id="pricing">
  <div class="wrap">
    <div class="pricing-wrap">
      <div class="wrap" style="padding:0 48px">
        <div class="sec-head reveal" style="margin-bottom:8px">
          <div class="sec-eyebrow" data-c="pricing.eyebrow"></div>
          <h2 data-c="pricing.title" data-html="1"></h2>
          <p data-c="pricing.subtitle"></p>
        </div>
        <div class="price-grid" id="priceGrid"><!-- rendered --></div>
        <p class="price-note" data-c="pricing.note"></p>
      </div>
    </div>
  </div>
</section>

<!-- TRIAL -->
<section class="section" id="trial">
  <div class="wrap">
    <div class="trial reveal">
      <h2 data-c="trial.title"></h2>
      <p data-c="trial.subtitle"></p>
      <a href="#buy" class="btn-primary" id="trialBtn"></a>
    </div>
  </div>
</section>

<!-- FAQ -->
<section class="section" id="faq">
  <div class="wrap">
    <div class="sec-head reveal">
      <div class="sec-eyebrow" data-c="faq.eyebrow"></div>
      <h2 data-c="faq.title" data-html="1"></h2>
    </div>
    <div class="faq-grid" id="faqGrid"><!-- rendered --></div>
  </div>
</section>

<!-- BUY -->
<section class="section" id="buy">
  <div class="wrap">
    <div class="buybox reveal">
      <div>
        <h2 data-c="buy.title"></h2>
        <p data-c="buy.subtitle"></p>
        <div class="pay-row">
          <span class="pi" data-c="buy.payIcon">🅿️</span>
          <div>
            <div class="pl" data-c="buy.payLabel"></div>
            <div class="pv" data-c="buy.paypal"></div>
          </div>
        </div>
        <div class="steps-mini" data-c="buy.miniSteps" data-html="1"></div>
