<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLEA POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #16213e;
        }

        /* Login Screen */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 15px;
        }

        .login-card {
            background: #1e2a4a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 340px;
            border: 1px solid #2a3a5e;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-logo h1 { color: #9b8fff; font-size: 1.8em; }
        .login-logo p { color: #a0a0b0; font-size: 0.85em; }

        .user-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .user-card {
            background: #16213e;
            border: 2px solid #2a3a5e;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-card.selected {
            border-color: #7c6fff;
            background: #0f3460;
        }

        .user-card .avatar { font-size: 1.8em; }
        .user-card .name { font-size: 0.7em; color: #e0e0e0; margin-top: 3px; }

        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65em;
            margin-top: 3px;
        }

        .admin-badge { background: #7c6fff; color: white; }
        .manager-badge { background: #2ed573; color: white; }
        .cashier-badge { background: #ffa502; color: white; }

        .section-label {
            text-align: center;
            color: #e0e0e0;
            font-size: 0.9em;
            margin: 10px 0;
        }

        .pin-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2a3a5e;
            transition: all 0.3s;
        }

        .pin-dot.filled { background: #7c6fff; box-shadow: 0 0 8px #7c6fff; }
        .pin-dot.error { background: #ff4757; }

        .error-msg {
            color: #ff4757;
            text-align: center;
            font-size: 0.8em;
            min-height: 18px;
            margin: 5px 0;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .pin-btn {
            background: #0f3460;
            border: 1px solid #2a3a5e;
            border-radius: 10px;
            padding: 16px;
            font-size: 1.3em;
            cursor: pointer;
            color: #e0e0e0;
        }

        .pin-btn:active { background: #7c6fff; }
        .pin-btn.clear { background: #ff4757; color: white; font-size: 0.9em; }
        .pin-btn.submit { background: #2ed573; color: white; font-size: 0.9em; }

        /* Main App */
        #mainApp { display: none; }

        .header {
            background: #1a1a2e;
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a5e;
        }

        .header h1 { color: #9b8fff; font-size: 1.2em; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8em;
            color: #a0a0b0;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .hamburger {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 22px;
            cursor: pointer;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            overflow-x: auto;
            padding: 8px;
            background: #1e2a4a;
            margin: 8px;
            border-radius: 10px;
            gap: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .nav-btn {
            flex: 0 0 auto;
            padding: 8px 14px;
            background: #16213e;
            border: 1px solid #2a3a5e;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.8em;
            color: #a0a0b0;
        }

        .nav-btn.active { background: #7c6fff; color: white; border-color: #7c6fff; }

        /* Content Area */
        #mainContent {
            padding: 10px;
            min-height: 60vh;
        }

        .card {
            background: #1e2a4a;
            border-radius: 10px;
            padding: 15px;
            margin: 8px 0;
            border: 1px solid #2a3a5e;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .metric-card {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a3a5e;
        }

        .metric-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #9b8fff;
        }

        .metric-label {
            font-size: 0.65em;
            color: #a0a0b0;
            margin-top: 4px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .product-card {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid #2a3a5e;
        }

        .product-card:active { transform: scale(0.96); }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
        }

        .btn-primary { background: #7c6fff; color: white; }
        .btn-success { background: #2ed573; color: white; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-warning { background: #ffa502; color: white; }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #2a3a5e;
            border-radius: 20px;
            font-size: 0.9em;
            background: #0f3460;
            color: #e0e0e0;
            outline: none;
        }

        input:focus, select:focus { border-color: #7c6fff; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8em;
        }

        th {
            background: #0f3460;
            color: #9b8fff;
            padding: 8px;
            text-align: left;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #2a3a5e;
            color: #a0a0b0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a5e;
        }

        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            bottom: 0;
            width: 260px;
            background: #1e2a4a;
            z-index: 1000;
            transition: left 0.3s;
            overflow-y: auto;
            border-right: 1px solid #2a3a5e;
        }

        .sidebar.active { left: 0; }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }

        .sidebar-overlay.active { display: block; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1e2a4a;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #2a3a5e;
        }

        .low-stock-badge {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 1px 6px;
            font-size: 0.7em;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- LOGIN SCREEN -->
        <div id="loginScreen">
            <div class="login-card">
                <div class="login-logo">
                    <h1>🏪 MLEA POS</h1>
                    <p>Point of Sale System</p>
                </div>

                <div class="section-label">👤 Select User</div>
                <div class="user-selector" id="userSelector"></div>

                <div class="section-label">🔢 Enter PIN</div>
                <div class="pin-display" id="pinDisplay">
                    <div class="pin-dot"></div><div class="pin-dot"></div>
                    <div class="pin-dot"></div><div class="pin-dot"></div>
                </div>
                <div class="error-msg" id="errorMessage"></div>

                <div class="pin-pad">
                    <button class="pin-btn" onclick="enterPin('1')">1</button>
                    <button class="pin-btn" onclick="enterPin('2')">2</button>
                    <button class="pin-btn" onclick="enterPin('3')">3</button>
                    <button class="pin-btn" onclick="enterPin('4')">4</button>
                    <button class="pin-btn" onclick="enterPin('5')">5</button>
                    <button class="pin-btn" onclick="enterPin('6')">6</button>
                    <button class="pin-btn" onclick="enterPin('7')">7</button>
                    <button class="pin-btn" onclick="enterPin('8')">8</button>
                    <button class="pin-btn" onclick="enterPin('9')">9</button>
                    <button class="pin-btn clear" onclick="clearPin()">Clear</button>
                    <button class="pin-btn" onclick="enterPin('0')">0</button>
                    <button class="pin-btn submit" onclick="submitPin()">→</button>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp">
            <!-- Sidebar -->
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
            <div class="sidebar" id="sidebar">
                <div style="padding: 15px; background: #1a1a2e; border-bottom: 1px solid #2a3a5e;">
                    <h3 style="color:#9b8fff;">MLEA POS</h3>
                    <p style="font-size:0.75em;color:#a0a0b0;" id="sidebarUserInfo"></p>
                </div>
                <div style="padding: 10px; display: flex; flex-direction: column; gap: 5px;">
                    <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
                    <button class="nav-btn" onclick="switchView('pos')">💻 POS Terminal</button>
                    <button class="nav-btn" onclick="switchView('inventory')">📦 Inventory</button>
                    <button class="nav-btn" onclick="switchView('suppliers')">🤝 Suppliers</button>
                    <button class="nav-btn" onclick="switchView('expenses')">💸 Expenses</button>
                    <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>
                    <button class="nav-btn" id="navUsers" onclick="switchView('users')">👥 Users</button>
                    <button class="nav-btn" onclick="switchView('reports')">💾 Reports</button>
                    <hr style="border-color:#2a3a5e; margin: 5px 0;">
                    <button class="btn btn-danger" style="width:100%;" onclick="logout()">🚪 Logout</button>
                </div>
            </div>

            <!-- Header -->
            <div class="header">
                <button class="hamburger" onclick="openSidebar()">☰</button>
                <h1>MLEA POS</h1>
                <div class="header-right">
                    <span id="headerCurrency"></span>
                    <span id="headerUser"></span>
                    <button class="logout-btn" onclick="logout()">🚪</button>
                </div>
            </div>

            <!-- Navigation Bar -->
            <div class="nav-bar" id="navBar">
                <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('pos')">💻 POS</button>
                <button class="nav-btn" onclick="switchView('inventory')">📦 Stock</button>
                <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>
            </div>

            <!-- Main Content -->
            <div id="mainContent">
                <p style="text-align:center; padding:40px; color:#a0a0b0;">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ==================== SIMPLE DATABASE ====================
        const DB = {
            get(key) {
                return JSON.parse(localStorage.getItem('mlea_' + key) || 'null');
            },
            set(key, value) {
                localStorage.setItem('mlea_' + key, JSON.stringify(value));
            },
            getAll(key) {
                return JSON.parse(localStorage.getItem('mlea_' + key) || '[]');
            },
            add(key, item) {
                const items = this.getAll(key);
                item.id = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
                items.push(item);
                this.set(key, items);
                return item.id;
            },
            update(key, item) {
                const items = this.getAll(key);
                const index = items.findIndex(i => i.id === item.id);
                if (index !== -1) items[index] = item;
                this.set(key, items);
            },
            delete(key, id) {
                const items = this.getAll(key).filter(i => i.id !== id);
                this.set(key, items);
            }
        };

        // ==================== CURRENCIES ====================
        const currencies = {
            USD: { symbol: '$', name: 'US Dollar', flag: '🇺🇸' },
            PHP: { symbol: '₱', name: 'Philippine Peso', flag: '🇵🇭' },
            EUR: { symbol: '€', name: 'Euro', flag: '🇪🇺' },
            GBP: { symbol: '£', name: 'British Pound', flag: '🇬🇧' },
            JPY: { symbol: '¥', name: 'Japanese Yen', flag: '🇯🇵' },
            INR: { symbol: '₹', name: 'Indian Rupee', flag: '🇮🇳' },
            CNY: { symbol: '¥', name: 'Chinese Yuan', flag: '🇨🇳' },
            KRW: { symbol: '₩', name: 'Korean Won', flag: '🇰🇷' },
            AUD: { symbol: 'A$', name: 'Australian Dollar', flag: '🇦🇺' },
            CAD: { symbol: 'C$', name: 'Canadian Dollar', flag: '🇨🇦' },
            SGD: { symbol: 'S$', name: 'Singapore Dollar', flag: '🇸🇬' },
            MYR: { symbol: 'RM', name: 'Malaysian Ringgit', flag: '🇲🇾' },
            IDR: { symbol: 'Rp', name: 'Indonesian Rupiah', flag: '🇮🇩' },
            THB: { symbol: '฿', name: 'Thai Baht', flag: '🇹🇭' },
            AED: { symbol: 'د.إ', name: 'UAE Dirham', flag: '🇦🇪' },
            SAR: { symbol: '﷼', name: 'Saudi Riyal', flag: '🇸🇦' }
        };

        // ==================== APP STATE ====================
        let currentUser = null;
        let currentView = 'dashboard';
        let currentCurrency = 'USD';
        let taxRate = 0.1;
        let cart = [];
        let selectedUserId = null;
        let pinEntry = '';
        let products = [];
        let users = [];

        function formatCurrency(amount) {
            const c = currencies[currentCurrency];
            if (['JPY', 'KRW', 'IDR'].includes(currentCurrency)) {
                return c.symbol + ' ' + Math.round(amount).toLocaleString();
            }
            return c.symbol + amount.toFixed(2);
        }

        // ==================== INIT ====================
        function initApp() {
            // Load users
            users = DB.getAll('users');
            if (users.length === 0) {
                users = [
                    { id: 1, name: 'Admin User', role: 'admin', active: true, pin: '1234' },
                    { id: 2, name: 'Manager', role: 'manager', active: true, pin: '5678' },
                    { id: 3, name: 'Cashier', role: 'cashier', active: true, pin: '9012' }
                ];
                users.forEach(u => DB.add('users', u));
                users = DB.getAll('users');
            }

            // Load products
            products = DB.getAll('products');
            if (products.length === 0) {
                const sampleProducts = [
                    { sku: 'SKU001', name: 'Product A', price: 29.99, stock: 50, category: 'Electronics', active: true, barcode: '123456789' },
                    { sku: 'SKU002', name: 'Product B', price: 49.99, stock: 5, category: 'Clothing', active: true, barcode: '987654321' },
                    { sku: 'SKU003', name: 'Product C', price: 19.99, stock: 0, category: 'Food', active: false, barcode: '456789123' },
                    { sku: 'SKU004', name: 'Product D', price: 99.99, stock: 20, category: 'Electronics', active: true, barcode: '789123456' }
                ];
                sampleProducts.forEach(p => DB.add('products', p));
                products = DB.getAll('products');
            }

            // Load settings
            const savedCurrency = DB.get('currency');
            if (savedCurrency) currentCurrency = savedCurrency;
            const savedTax = DB.get('taxRate');
            if (savedTax) taxRate = parseFloat(savedTax);

            renderLoginScreen();
        }

        // ==================== LOGIN ====================
        function renderLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            
            const userSelector = document.getElementById('userSelector');
            userSelector.innerHTML = users.filter(u => u.active).map(u => `
                <div class="user-card ${selectedUserId === u.id ? 'selected' : ''}" onclick="selectUser(${u.id})">
                    <div class="avatar">${u.role === 'admin' ? '👑' : u.role === 'manager' ? '👨‍💼' : '👤'}</div>
                    <div class="name">${u.name}</div>
                    <span class="role-badge ${u.role}-badge">${u.role}</span>
                </div>
            `).join('');
        }

        function selectUser(userId) {
            selectedUserId = userId;
            pinEntry = '';
            updatePinDisplay();
            document.getElementById('errorMessage').textContent = '';
            renderLoginScreen();
        }

        function enterPin(digit) {
            if (!selectedUserId) {
                document.getElementById('errorMessage').textContent = 'Select a user first';
                return;
            }
            if (pinEntry.length < 4) {
                pinEntry += digit;
                updatePinDisplay();
                document.getElementById('errorMessage').textContent = '';
            }
        }

        function clearPin() {
            pinEntry = '';
            updatePinDisplay();
            document.getElementById('errorMessage').textContent = '';
        }

        function updatePinDisplay() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('filled', i < pinEntry.length);
                dot.classList.remove('error');
            });
        }

        function submitPin() {
            if (!selectedUserId) {
                document.getElementById('errorMessage').textContent = 'Select a user first';
                return;
            }

            const user = users.find(u => u.id === selectedUserId);
            if (user && user.pin === pinEntry) {
                // SUCCESSFUL LOGIN
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                
                document.getElementById('headerUser').textContent = user.name;
                document.getElementById('headerCurrency').textContent = currencies[currentCurrency].flag + ' ' + currentCurrency;
                document.getElementById('sidebarUserInfo').textContent = user.name + ' (' + user.role + ')';
                
                // Show/hide users nav
                const navUsers = document.getElementById('navUsers');
                if (navUsers) navUsers.style.display = user.role === 'admin' ? 'block' : 'none';
                
                // Reset
                pinEntry = '';
                selectedUserId = null;
                updatePinDisplay();
                
                // RENDER DASHBOARD
                switchView('dashboard');
            } else {
                document.getElementById('errorMessage').textContent = 'Wrong PIN!';
                pinEntry = '';
                updatePinDisplay();
                // Shake
                const dots = document.querySelectorAll('.pin-dot');
                dots.forEach(d => d.classList.add('error'));
                setTimeout(() => dots.forEach(d => d.classList.remove('error')), 400);
            }
        }

        function logout() {
            currentUser = null;
            cart = [];
            document.getElementById('mainApp').style.display = 'none';
            closeSidebar();
            renderLoginScreen();
        }

        // ==================== NAVIGATION ====================
        function openSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarOverlay').classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        function switchView(view) {
            currentView = view;
            closeSidebar();
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Render the view
            const content = document.getElementById('mainContent');
            
            switch(view) {
                case 'dashboard': renderDashboard(content); break;
                case 'pos': renderPOS(content); break;
                case 'inventory': renderInventory(content); break;
                case 'suppliers': renderSuppliers(content); break;
                case 'expenses': renderExpenses(content); break;
                case 'settings': renderSettings(content); break;
                case 'users': renderUsers(content); break;
                case 'reports': renderReports(content); break;
                default: renderDashboard(content);
            }
        }

        // ==================== VIEWS ====================
        function renderDashboard(el) {
            products = DB.getAll('products');
            const sales = DB.getAll('sales') || [];
            const today = new Date().toISOString().split('T')[0];
            const todaySales = sales.filter(s => s.date === today).reduce((sum, s) => sum + s.total, 0);
            const monthSales = sales.filter(s => s.date.startsWith(today.substring(0,7))).reduce((sum, s) => sum + s.total, 0);
            const lowStock = products.filter(p => p.stock < 10 && p.active).length;

            el.innerHTML = `
                <div class="metrics">
                    <div class="metric-card">
                        <div class="metric-value">${formatCurrency(todaySales)}</div>
                        <div class="metric-label">Today's Sales</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${formatCurrency(monthSales)}</div>
                        <div class="metric-label">Monthly Revenue</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${lowStock}</div>
                        <div class="metric-label">Low Stock Items</div>
                    </div>
                </div>
                <div class="card">
                    <h4>Welcome, ${currentUser.name}! 👋</h4>
                    <p style="color:#a0a0b0;font-size:0.8em;">Role: ${currentUser.role} | Currency: ${currencies[currentCurrency].flag} ${currentCurrency}</p>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                    <button class="btn btn-primary" onclick="switchView('pos')">🛒 New Sale</button>
                    <button class="btn btn-success" onclick="switchView('inventory')">📦 Inventory</button>
                    <button class="btn btn-warning" onclick="switchView('settings')">⚙️ Settings</button>
                    <button class="btn btn-primary" onclick="switchView('reports')">📊 Reports</button>
                </div>
                ${lowStock > 0 ? `<div class="card" style="background:rgba(255,71,87,0.15);border-color:#ff4757;">
                    ⚠️ ${lowStock} products are low on stock!
                </div>` : ''}
            `;
        }

        function renderPOS(el) {
            products = DB.getAll('products');
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * taxRate;
            const total = subtotal + tax;

            el.innerHTML = `
                <input type="text" placeholder="🔍 Scan barcode or search..." style="margin-bottom:10px;" 
                       onkeypress="if(event.key==='Enter'){addToCart(event.target.value);event.target.value='';}">
                
                <div class="product-grid">
                    ${products.filter(p => p.active).slice(0, 6).map(p => `
                        <div class="product-card" onclick="addToCart('${p.sku}')">
                            <strong>${p.name}</strong>
                            <div style="color:#9b8fff;">${formatCurrency(p.price)}</div>
                            <small style="color:#a0a0b0;">Stock: ${p.stock}</small>
                        </div>
                    `).join('')}
                </div>

                <div class="card" style="margin-top:10px;">
                    <h4>🛒 Cart (${cart.length} items)</h4>
                    ${cart.map((item, i) => `
                        <div class="cart-item">
                            <span>${item.name} x${item.quantity}</span>
                            <span>${formatCurrency(item.price * item.quantity)}</span>
                            <button class="btn btn-danger" style="padding:3px 8px;font-size:0.7em;" onclick="removeFromCart(${i})">✕</button>
                        </div>
                    `).join('')}
                    ${cart.length === 0 ? '<p style="color:#a0a0b0;text-align:center;">Cart is empty</p>' : ''}
                    
                    <hr style="border-color:#2a3a5e;margin:10px 0;">
                    <div>Subtotal: ${formatCurrency(subtotal)}</div>
                    <div>Tax (${(taxRate*100).toFixed(0)}%): ${formatCurrency(tax)}</div>
                    <div style="font-size:1.2em;color:#9b8fff;"><strong>Total: ${formatCurrency(total)}</strong></div>
                    
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
                        <button class="btn btn-success" onclick="processPayment('cash')">💵 Cash</button>
                        <button class="btn btn-primary" onclick="processPayment('card')">💳 Card</button>
                    </div>
                </div>
            `;
        }

        function renderInventory(el) {
            products = DB.getAll('products');
            el.innerHTML = `
                <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddProduct()">+ Add Product</button>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Name</th><th>Price</th><th>Stock</th><th>Act</th></tr></thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>${p.name}</td>
                                    <td>${formatCurrency(p.price)}</td>
                                    <td>${p.stock} ${p.stock < 10 ? '<span class="low-stock-badge">!</span>' : ''}</td>
                                    <td>
                                        <button class="btn btn-success" style="padding:3px 6px;font-size:0.7em;" onclick="adjustStock(${p.id})">+</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderSettings(el) {
            el.innerHTML = `
                <div class="card">
                    <h4>💱 Currency</h4>
                    <select id="currencySelect" onchange="changeCurrency(this.value)">
                        ${Object.entries(currencies).map(([code, c]) => `
                            <option value="${code}" ${currentCurrency === code ? 'selected' : ''}>${c.flag} ${c.name} (${c.symbol})</option>
                        `).join('')}
                    </select>
                    <p style="color:#a0a0b0;font-size:0.8em;margin-top:5px;">
                        Current: ${currencies[currentCurrency].flag} ${currencies[currentCurrency].name}
                    </p>
                </div>
                <div class="card" style="margin-top:10px;">
                    <h4>💰 Tax Rate</h4>
                    <input type="number" id="taxInput" value="${taxRate * 100}" step="0.1" min="0" max="100">
                    <p style="color:#a0a0b0;font-size:0.8em;">Current: ${(taxRate * 100).toFixed(1)}%</p>
                    <button class="btn btn-primary" style="margin-top:8px;" onclick="saveTax()">Save Tax Rate</button>
                </div>
            `;
        }

        function renderSuppliers(el) {
            const suppliers = DB.getAll('suppliers');
            el.innerHTML = `
                <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddSupplier()">+ Add Supplier</button>
                ${suppliers.map(s => `
                    <div class="card">
                        <h4>${s.name}</h4>
                        <p style="color:#a0a0b0;font-size:0.8em;">📞 ${s.phone} | 📧 ${s.email}</p>
                    </div>
                `).join('')}
                ${suppliers.length === 0 ? '<p style="text-align:center;color:#a0a0b0;">No suppliers yet</p>' : ''}
            `;
        }

        function renderExpenses(el) {
            const expenses = DB.getAll('expenses');
            el.innerHTML = `
                <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddExpense()">+ Add Expense</button>
                ${expenses.map(e => `
                    <div class="card">
                        <h4>${e.type}</h4>
                        <p style="color:#a0a0b0;">💰 ${formatCurrency(e.amount)} | 📅 ${e.date}</p>
                    </div>
                `).join('')}
                ${expenses.length === 0 ? '<p style="text-align:center;color:#a0a0b0;">No expenses yet</p>' : ''}
            `;
        }

        function renderUsers(el) {
            if (currentUser.role !== 'admin') {
                el.innerHTML = '<p style="text-align:center;color:#ff4757;">🔒 Admin access required</p>';
                return;
            }
            users = DB.getAll('users');
            el.innerHTML = `
                <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="showAddUser()">+ Add User</button>
                ${users.map(u => `
                    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <strong>${u.name}</strong>
                            <span class="role-badge ${u.role}-badge">${u.role}</span>
                            <span style="font-size:0.7em;">${u.active ? '✅' : '❌'}</span>
                        </div>
                        <button class="btn btn-primary" style="padding:5px 10px;font-size:0.7em;" onclick="toggleUser(${u.id})">Toggle</button>
                    </div>
                `).join('')}
            `;
        }

        function renderReports(el) {
            el.innerHTML = `
                <div style="display:grid;gap:8px;">
                    <button class="btn btn-primary" onclick="exportCSV('sales')">📊 Sales Report (CSV)</button>
                    <button class="btn btn-success" onclick="exportCSV('inventory')">📦 Inventory Report (CSV)</button>
                    <button class="btn btn-primary" onclick="exportCSV('expenses')">💸 Expenses Report (CSV)</button>
                    <button class="btn btn-warning" onclick="window.print()">🖨️ Print</button>
                </div>
            `;
        }

        // ==================== CART FUNCTIONS ====================
        function addToCart(sku) {
            const product = products.find(p => (p.sku === sku || p.barcode === sku) && p.active);
            if (product && product.stock > 0) {
                const existing = cart.find(i => i.sku === product.sku);
                if (existing) {
                    existing.quantity++;
                } else {
                    cart.push({ ...product, quantity: 1 });
                }
                switchView('pos');
            } else {
                alert('Product not found or out of stock!');
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            switchView('pos');
        }

        function processPayment(method) {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const sale = {
                date: new Date().toISOString().split('T')[0],
                total: subtotal + (subtotal * taxRate),
                subtotal: subtotal,
                tax: subtotal * taxRate,
                paymentMethod: method,
                cashierId: currentUser.id,
                currency: currentCurrency
            };

            DB.add('sales', sale);

            // Update stock
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.quantity;
                    DB.update('products', product);
                }
            });

            // Show receipt
            const receiptHTML = `
                <div style="text-align:center;">
                    <h3>MLEA POS</h3>
                    <p style="color:#a0a0b0;">Receipt</p>
                    <hr style="border-color:#2a3a5e;">
                    ${cart.map(i => `<p>${i.name} x${i.quantity} - ${formatCurrency(i.price * i.quantity)}</p>`).join('')}
                    <hr style="border-color:#2a3a5e;">
                    <h3>Total: ${formatCurrency(sale.total)}</h3>
                    <p style="color:#a0a0b0;">Payment: ${method.toUpperCase()}</p>
                    <p style="color:#2ed573;">Thank you! 🎉</p>
                </div>
            `;

            document.getElementById('modalContent').innerHTML = receiptHTML;
            document.getElementById('modal').classList.add('active');

            cart = [];
            products = DB.getAll('products');

            setTimeout(() => {
                document.getElementById('modal').classList.remove('active');
                switchView('dashboard');
            }, 2500);
        }

        // ==================== SETTINGS ====================
        function changeCurrency(code) {
            currentCurrency = code;
            DB.set('currency', code);
            document.getElementById('headerCurrency').textContent = currencies[code].flag + ' ' + code;
            switchView('settings');
        }

        function saveTax() {
            const val = parseFloat(document.getElementById('taxInput').value);
            if (!isNaN(val) && val >= 0 && val <= 100) {
                taxRate = val / 100;
                DB.set('taxRate', taxRate.toString());
                alert('Tax rate saved!');
            }
        }

        // ==================== MODALS ====================
        function showAddProduct() {
            document.getElementById('modalContent').innerHTML = `
                <h4>Add Product</h4>
                <input type="text" id="pName" placeholder="Name" style="margin:5px 0;"><br>
                <input type="number" id="pPrice" placeholder="Price" step="0.01" style="margin:5px 0;"><br>
                <input type="number" id="pStock" placeholder="Stock" style="margin:5px 0;"><br>
                <input type="text" id="pSku" placeholder="SKU" style="margin:5px 0;"><br>
                <div style="margin-top:10px;">
                    <button class="btn btn-primary" onclick="addProduct()">Save</button>
                    <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addProduct() {
            const product = {
                sku: document.getElementById('pSku').value || 'SKU' + Date.now(),
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value) || 0,
                stock: parseInt(document.getElementById('pStock').value) || 0,
                category: 'General',
                active: true,
                barcode: Math.random().toString(36).substring(7)
            };
            DB.add('products', product);
            products = DB.getAll('products');
            closeModal();
            switchView('inventory');
        }

        function showAddSupplier() {
            document.getElementById('modalContent').innerHTML = `
                <h4>Add Supplier</h4>
                <input type="text" id="sName" placeholder="Name" style="margin:5px 0;"><br>
                <input type="text" id="sPhone" placeholder="Phone" style="margin:5px 0;"><br>
                <input type="email" id="sEmail" placeholder="Email" style="margin:5px 0;"><br>
                <div style="margin-top:10px;">
                    <button class="btn btn-primary" onclick="addSupplier()">Save</button>
                    <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addSupplier() {
            const supplier = {
                name: document.getElementById('sName').value,
                phone: document.getElementById('sPhone').value,
                email: document.getElementById('sEmail').value,
                address: ''
            };
            DB.add('suppliers', supplier);
            closeModal();
            switchView('suppliers');
        }

        function showAddExpense() {
            document.getElementById('modalContent').innerHTML = `
                <h4>Add Expense</h4>
                <input type="text" id="eType" placeholder="Type" style="margin:5px 0;"><br>
                <input type="number" id="eAmount" placeholder="Amount" step="0.01" style="margin:5px 0;"><br>
                <div style="margin-top:10px;">
                    <button class="btn btn-primary" onclick="addExpense()">Save</button>
                    <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addExpense() {
            const expense = {
                type: document.getElementById('eType').value,
                amount: parseFloat(document.getElementById('eAmount').value) || 0,
                date: new Date().toISOString().split('T')[0],
                category: 'General'
            };
            DB.add('expenses', expense);
            closeModal();
            switchView('expenses');
        }

        function showAddUser() {
            document.getElementById('modalContent').innerHTML = `
                <h4>Add User</h4>
                <input type="text" id="uName" placeholder="Name" style="margin:5px 0;"><br>
                <select id="uRole" style="margin:5px 0;">
                    <option value="cashier">Cashier</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                </select><br>
                <input type="password" id="uPin" placeholder="4-digit PIN" maxlength="4" style="margin:5px 0;"><br>
                <div style="margin-top:10px;">
                    <button class="btn btn-primary" onclick="addUser()">Save</button>
                    <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function addUser() {
            const name = document.getElementById('uName').value;
            const pin = document.getElementById('uPin').value;
            if (!name || pin.length !== 4) {
                alert('Name required and PIN must be 4 digits');
                return;
            }
            const user = {
                name: name,
                role: document.getElementById('uRole').value,
                active: true,
                pin: pin
            };
            DB.add('users', user);
            users = DB.getAll('users');
            closeModal();
            switchView('users');
            renderLoginScreen();
        }

        function adjustStock(productId) {
            const product = products.find(p => p.id === productId);
            const newStock = prompt(`Adjust stock for ${product.name}. Current: ${product.stock}`, product.stock + 10);
            if (newStock && !isNaN(newStock)) {
                product.stock = parseInt(newStock);
                DB.update('products', product);
                products = DB.getAll('products');
                switchView('inventory');
            }
        }

        function toggleUser(userId) {
            const user = users.find(u => u.id === userId);
            user.active = !user.active;
            DB.update('users', user);
            users = DB.getAll('users');
            switchView('users');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ==================== EXPORT ====================
        function exportCSV(type) {
            let csv = '';
            if (type === 'sales') {
                const sales = DB.getAll('sales');
                csv = 'Date,Total,Payment,Cashier\n';
                sales.forEach(s => {
                    csv += `${s.date},${s.total},${s.paymentMethod},${s.cashierId}\n`;
                });
            } else if (type === 'inventory') {
                csv = 'Name,Price,Stock,SKU\n';
                products.forEach(p => {
                    csv += `${p.name},${p.price},${p.stock},${p.sku}\n`;
                });
            } else if (type === 'expenses') {
                const expenses = DB.getAll('expenses');
                csv = 'Type,Amount,Date\n';
                expenses.forEach(e => {
                    csv += `${e.type},${e.amount},${e.date}\n`;
                });
            }
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${type}_report.csv`;
            a.click();
        }

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Keyboard support for login
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('loginScreen').style.display !== 'none') {
                if (e.key >= '0' && e.key <= '9') enterPin(e.key);
                else if (e.key === 'Enter') submitPin();
                else if (e.key === 'Backspace') { pinEntry = pinEntry.slice(0, -1); updatePinDisplay(); }
            }
        });

        // START APP
        initApp();
    </script>
</body>
</html>
